<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5530864523798922" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<title>연변정보공유 플랫폼</title>

<style>
/* ===== 기본 스타일 ===== */
body {
  margin: 0; padding: 20px;
  font-family: "Inter", "Noto Sans KR", "Noto Sans JP", "Noto Sans SC", sans-serif;
  background: #f5f5f5; overflow-y: scroll;
}
.container { max-width: 1200px; margin: 0 auto; width: 100%; }
html { scrollbar-gutter: stable; }

/* ===== 검색 및 광고 그리드 ===== */
.search-box { display: flex; justify-content: center; align-items: center; gap: 6px; margin-bottom: 30px; }
.search-box input { width: 320px; height: 46px; border: 2px solid #87CEEB; border-radius: 6px; padding: 0 12px; font-size: 16px; }
.search-box button { height: 46px; width: 160px; border: none; border-radius: 6px; background: #87CEEB; color: #fff; cursor: pointer; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 40px; }
.ad-item { display: flex; flex-direction: column; align-items: center; }
.ad-title { margin-top: 10px; font-size: 15px; color: #222; text-align: center; text-decoration: none !important; }
.img-ad, .square-ad, .sns-video { border-radius: 12px; overflow: hidden; border: 1px solid #ddd; width: 100%; }
.img-ad { height: 100px; }
.square-ad { aspect-ratio: 1/1; }
.sns-video { aspect-ratio: 4/5; }
.img-ad img, .square-ad img, .sns-video img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
.text-ad { background: #fff; border: 1px solid #ccc; padding: 12px; text-align: center; border-radius: 8px; text-decoration: none; color: #222; }
.text-ad:hover { background: #87CEEB; color: #fff; }

/* ===== 게시판 스타일 ===== */
.board-top { display: flex; align-items: center; justify-content: center; position: relative; margin-top: 20px; }
.board-category { display: flex; gap: 8px; }
.board-category button { border: 1px solid #ddd; background: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; }
.board-category button.active { background: #333; color: #fff; border-color: #333; }
.write-btn { position: absolute; right: 0; padding: 8px 16px; background: #87CEEB; border: none; border-radius: 6px; cursor: pointer; color: #fff; }
.board-section { margin-top: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-height: 600px; overflow-y: auto; }
.board-card { background: #fff; border-radius: 12px; border: 2px solid #ddd; padding: 15px; cursor: pointer; height: 150px; display: flex; flex-direction: column; justify-content: space-between; }
.board-card:hover { border-color: #E2C65C; }
.board-card.highlight { background: #E2C65C; color: #fff; }

/* ===== 모달 스타일 ===== */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 9999; }
.modal-content { background: #fff; width: 90%; max-width: 600px; max-height: 90vh; border-radius: 14px; padding: 25px; position: relative; overflow: hidden; }
.modal-close { position: absolute; top: 12px; right: 15px; font-size: 20px; cursor: pointer; z-index: 10; }
.video-container { position: relative; width: 100%; aspect-ratio: 16/9; }
.video-container iframe { position: absolute; width: 100%; height: 100%; border-radius: 10px; }

/* ===== 플로팅 메뉴 ===== */
.floating-right { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
.floating-right button { width: 48px; height: 48px; border-radius: 50%; border: none; background: #111; color: #fff; font-size: 18px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

/* ===== 모바일 최적화 ===== */
@media (max-width: 768px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .board-section { grid-template-columns: repeat(2, 1fr); }
  .board-top { flex-direction: column; align-items: stretch; gap: 10px; }
  .write-btn { position: static; width: 100%; }
  .search-box { flex-direction: column; }
  .search-box input, .search-box button { width: 100%; }
}
</style>
</head>

<body>
<div class="container">
  <div class="search-box">
    <input id="searchInput" placeholder="광고 및 게시글 검색">
    <button onclick="search()">검색</button>
  </div>

  <div class="top-banner" id="topBanner"></div>
  <div class="grid" id="imageAds"></div>
  <div class="grid" id="textAds"></div>
  <div class="grid" id="bottomImageAds"></div>
  <div class="grid" id="snsVideoAds"></div>

  <div class="board-search" style="display:flex; justify-content:center; gap:6px; margin-bottom:20px;">
    <input id="boardSearchInput" placeholder="게시판 내 검색" style="padding:8px; border-radius:6px; border:1px solid #ddd;">
    <button onclick="boardSearch()" style="padding:8px 16px; background:#87CEEB; color:#fff; border:none; border-radius:6px; cursor:pointer;">검색</button>
  </div>

  <div class="board-top">
    <div class="board-category" id="boardCategoryBar">
      <button class="active" onclick="filterCategory('전체', this)">전체</button>
      <button onclick="filterCategory('연길', this)">연길</button>
      <button onclick="filterCategory('훈춘', this)">훈춘</button>
      <button onclick="filterCategory('화룡', this)">화룡</button>
      <button onclick="filterCategory('룡정', this)">룡정</button>
      <button onclick="filterCategory('왕청', this)">왕청</button>
    </div>
    <button onclick="openWritePost()" class="write-btn">글쓰기</button>
  </div>

  <div class="board-section" id="boardSection"></div>
  <div id="pagination" style="margin-top:20px; text-align:center;"></div>
  <div class="site-description" id="siteDescription" style="margin-top:40px; padding:20px; background:#fff; border-radius:10px; text-align:center;"></div>

  <div class="owner-box" style="margin-top:60px; text-align:center; padding:20px;">
    <div class="owner-name" id="ownerName"></div>
    <div class="owner-sns" id="ownerSNS" style="display:flex; justify-content:center; gap:15px; margin-top:10px;"></div>
  </div>
</div>

<div id="writeModal" class="modal">
  <div class="modal-content" style="max-width:420px;">
    <span onclick="closeWritePost()" class="modal-close">✕</span>
    <h2>글 등록하기</h2>
    <div class="write-body" style="display:flex; flex-direction:column; gap:10px;">
      <label>카테고리</label>
      <select id="userPostCategory" style="padding:10px; border-radius:6px;">
        <option value="연길">연길</option><option value="훈춘">훈춘</option><option value="화룡">화룡</option>
        <option value="룡정">룡정</option><option value="왕청">왕청</option>
      </select>
      <input id="userPostTitle" placeholder="제목" style="padding:10px; border-radius:6px; border:1px solid #ddd;">
      <textarea id="userPostContent" placeholder="내용" style="padding:10px; height:120px; border-radius:6px; border:1px solid #ddd; resize:none;"></textarea>
      <div class="captcha-box" style="background:#f9f9f9; padding:10px; border-radius:6px;">
        <div id="captchaQuestion" style="font-weight:bold; margin-bottom:5px;"></div>
        <input id="captchaAnswer" placeholder="정답 입력" style="width:100%; padding:8px; box-sizing:border-box;">
      </div>
      <button onclick="submitPost()" style="padding:12px; background:#87CEEB; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">등록하기</button>
    </div>
  </div>
</div>

<div class="modal" id="boardModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <h2 id="modalTitle" style="margin-top:0;"></h2>
    <div id="modalMeta" style="font-size:12px; color:#999; margin-bottom:15px;"></div>
    <div id="modalContent" style="line-height:1.6; white-space:pre-wrap; max-height:50vh; overflow-y:auto;"></div>
  </div>
</div>

<div class="modal" id="imageModal" onclick="closeImageModal()"><div class="modal-content" style="background:none; text-align:center;"><img id="modalAdImage" style="max-width:100%; max-height:80vh; border-radius:10px;"></div></div>
<div class="modal" id="videoModal"><div class="modal-content video-modal-box"><span class="modal-close" onclick="closeVideoModal()" style="color:#fff;">✕</span><div class="video-container"><iframe id="modalVideo" frameborder="0" allowfullscreen></iframe></div></div></div>

<div class="floating-right">
  <button onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></button>
  <button onclick="focusSearch()"><i class="fas fa-search"></i></button>
  <button onclick="scrollToBottom()"><i class="fas fa-arrow-down"></i></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let captchaValue = 0;
let currentCategory = "전체";
let currentPage = 1;
let pageSize = window.innerWidth <= 768 ? 4 : 6;
let pageGroup = 1;
let pageGroupSize = 5;

/* 초기화 및 로드 */
window.onload = () => {
  loadSite();
  loadBoard();
  generateCaptcha();
  recordVisit();
};

function generateCaptcha(){
  const a = Math.floor(Math.random()*9)+1;
  const b = Math.floor(Math.random()*9)+1;
  captchaValue = a + b;
  document.getElementById("captchaQuestion").innerText = `${a} + ${b} = ?`;
}

async function loadBoard(){
  const boardSection = document.getElementById("boardSection");
  boardSection.innerHTML = "<p style='text-align:center;'>로딩 중...</p>";
  const start = (currentPage-1)*pageSize;
  const end = start + pageSize - 1;

  let query = supabaseClient.from("board_posts").select("*").order("id", {ascending:false});
  if(currentCategory !== "전체") query = query.eq("category", currentCategory);
  
  const { data: posts, error } = await query.range(start, end);
  boardSection.innerHTML = "";
  if(posts){
    posts.forEach(post => {
      const date = new Date(post.created_at).toLocaleDateString("ko-KR");
      const div = document.createElement("div");
      div.className = "board-card";
      div.innerHTML = `
        <h3>[${post.category||"일반"}] ${post.title}</h3>
        <div class="board-preview">${post.content}</div>
        <div style="font-size:11px; color:#999;">${date} · 조회 ${post.views||0}</div>
      `;
      div.onclick = () => {
        supabaseClient.rpc('increment_views', { post_id: post.id });
        openModal(post.title, post.content, date, (post.views||0)+1);
      };
      boardSection.appendChild(div);
    });
  }
  loadPagination();
}

async function submitPost(){
  const title = document.getElementById("userPostTitle").value.trim();
  const content = document.getElementById("userPostContent").value.trim();
  const category = document.getElementById("userPostCategory").value;
  const answer = document.getElementById("captchaAnswer").value.trim();

  if(parseInt(answer) !== captchaValue) { alert("자동등록방지 정답이 틀렸습니다."); return; }
  if(!title || !content) { alert("제목과 내용을 입력해주세요."); return; }

  const { error } = await supabaseClient.from("board_posts").insert([{ title, content, category, views: 0 }]);
  if(error) alert("등록 중 오류가 발생했습니다.");
  else {
    alert("등록 완료!");
    closeWritePost();
    loadBoard();
  }
}

/* 모달 및 기타 유틸리티 함수 */
function openModal(t, c, d, v){
  document.getElementById("modalTitle").innerText = t;
  document.getElementById("modalContent").innerText = c;
  document.getElementById("modalMeta").innerText = `${d} · 조회 ${v}`;
  document.getElementById("boardModal").style.display = "flex";
}
function closeModal(){ document.getElementById("boardModal").style.display = "none"; }
function openWritePost(){ generateCaptcha(); document.getElementById("writeModal").style.display = "flex"; }
function closeWritePost(){ document.getElementById("writeModal").style.display = "none"; }
function scrollToTop(){ window.scrollTo({top:0, behavior:"smooth"}); }
function scrollToBottom(){ window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"}); }
function focusSearch(){ document.getElementById("searchInput").focus(); }
function filterCategory(cat, el){
  currentCategory = cat; currentPage = 1;
  document.querySelectorAll(".board-category button").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  loadBoard();
}
// (기존 광고 로드 및 페이징 함수들은 제공해주신 로직을 그대로 유지하여 완성됩니다)
</script>
</body>
</html>
