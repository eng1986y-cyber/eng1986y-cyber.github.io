<script>

let noticePage = 1;
let regionPage = 1;

const boardPageSize = 17;

let captchaValue = 0;

function generateCaptcha(){
  const a = Math.floor(Math.random()*9)+1;
  const b = Math.floor(Math.random()*9)+1;

  captchaValue = a + b;

  document.getElementById("captchaQuestion").innerText =
    a + " + " + b + " = ?";
}

function escapeHTML(str){
  if(!str) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

let currentCategory = "전체";

function filterCategory(cat, el){

  currentCategory = cat;

  noticePage = 1;
  regionPage = 1;

  document
    .querySelectorAll(".board-category button")
    .forEach(btn=>btn.classList.remove("active"));

  el.classList.add("active");

  loadBoard();
}

function openImageModal(url){
  const modal = document.getElementById("imageModal");
  const content = modal.querySelector(".modal-content");

  document.getElementById("modalAdImage").src = url;

  // 화면 높이에 맞춰 높이 조정
  const vh = window.innerHeight;
  content.style.maxHeight = vh * 0.9 + "px"; // 화면 90%
  content.style.overflow = "hidden";

  modal.style.display="flex";
}

function closeImageModal(){

  document.getElementById("imageModal").style.display="none";
  document.getElementById("modalAdImage").src="";

}

function openVideoModal(url){

let embed="";

if(!url) return;

/* YouTube */
if(url.includes("youtube.com") || url.includes("youtu.be")){

let videoId="";

if(url.includes("watch")){
const params = new URL(url).searchParams;
videoId = params.get("v");
}
else if(url.includes("shorts")){
videoId = url.split("shorts/")[1];
}
else{
videoId = url.split("/").pop();
}

embed = "https://www.youtube.com/embed/"+videoId+"?autoplay=1";

}

/* Bilibili */
else if(url.includes("bilibili.com")){

let bvid = url.split("/video/")[1];
if(bvid) bvid = bvid.split("?")[0];

embed = "https://player.bilibili.com/player.html?bvid="+bvid+"&autoplay=1";

}

/* iQIYI */
else if(url.includes("iqiyi.com")){

embed = url;

}

/* Youku */
else if(url.includes("youku.com")){

embed = url;

}

/* Vimeo */
else if(url.includes("vimeo.com")){

let id = url.split("/").pop();
embed = "https://player.vimeo.com/video/"+id+"?autoplay=1";

}

/* mp4 직접영상 */
else if(url.endsWith(".mp4")){

document.getElementById("modalVideo").outerHTML =
`<video id="modalVideo" controls autoplay style="width:100%;height:100%">
<source src="${url}" type="video/mp4">
</video>`;

document.getElementById("videoModal").style.display="flex";

return;

}

/* 기본 iframe */
else{
embed=url;
}

document.getElementById("modalVideo").src = embed;
document.getElementById("videoModal").style.display="flex";

}

function closeVideoModal(){

const iframe = document.getElementById("modalVideo");

if(iframe.tagName==="IFRAME"){
iframe.src="";
}

document.getElementById("videoModal").style.display="none";

}

let currentPage = 1;

let pageSize = window.innerWidth <= 768 ? 6 : 12;

let pageGroup = 1;
let pageGroupSize = 5;

async function loadPagination(){

let query = supabaseClient
  .from("board_posts")
  .select("*",{count:"exact", head:true});

if(currentCategory !== "전체"){
  query = query.eq("category", currentCategory);
}

const { count } = await query;

  const totalPages = Math.ceil(count / pageSize);

  const pagination = document.getElementById("pagination");
  pagination.innerHTML="";

  const startPage = (pageGroup - 1) * pageGroupSize + 1;
  const endPage = Math.min(startPage + pageGroupSize - 1, totalPages);

  /* 이전 그룹 */
  if(pageGroup > 1){

    const prev=document.createElement("button");
    prev.innerText="<<";

    prev.onclick=()=>{
      pageGroup--;
      loadPagination();
    };

    pagination.appendChild(prev);
  }

  /* 페이지 번호 */
  for(let i=startPage;i<=endPage;i++){

    const btn=document.createElement("button");
    btn.innerText=i;

    if(i===currentPage)
      btn.style.background="#87CEEB";

    btn.onclick=()=>{
      currentPage=i;
      loadBoard();

      document.getElementById("boardSection").scrollIntoView({
        behavior:"smooth"
      });
    };

    pagination.appendChild(btn);
  }

  /* 다음 그룹 */
  if(endPage < totalPages){

    const next=document.createElement("button");
    next.innerText=">>";

    next.onclick=()=>{
      pageGroup++;
      loadPagination();
    };

    pagination.appendChild(next);
  }

}

function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

function scrollToBottom(){
  window.scrollTo({
    top:document.documentElement.scrollHeight,
    behavior:"smooth"
  });
}

function focusSearch(){
  document.getElementById("searchInput").focus();
}

async function loadSite(){

  const boardSection=document.getElementById("boardSection");
  const imgBox=document.getElementById("imageAds");
  const txtBox=document.getElementById("textAds");
  const bottomBox=document.getElementById("bottomImageAds");
  const snsBox=document.getElementById("snsVideoAds");
  const bannerBox=document.getElementById("topBanner");

  // 🔥 전체 초기화
  boardSection.innerHTML="";
  imgBox.innerHTML="";
  txtBox.innerHTML="";
  bottomBox.innerHTML="";
  snsBox.innerHTML="";
  bannerBox.innerHTML="";

  /* ================= 광고 ================= */

  const { data: ads } = await supabaseClient
    .from("ads")
    .select("*")
    .order("id",{ascending:true});

  if(ads){
    ads.forEach(ad=>{

if(ad.type==="image"){
  const wrap=document.createElement("div");
  wrap.className="ad-item";
  wrap.setAttribute("data-title",(ad.main_title||"").toLowerCase());

const link = ad.link_url 
  ? `<a href="${ad.link_url}" target="_blank">
       <img src="${ad.image_url}" alt="${ad.main_title||'延边广告'}">
     </a>`
  : ad.video_url
  ? `<img src="${ad.image_url}" onclick="openVideoModal('${ad.video_url}')">`
  : `<img src="${ad.image_url}" onclick="openImageModal('${ad.image_url}')">`;

  wrap.innerHTML=`
    <div class="img-ad">${link}</div>
    <div class="ad-title">${escapeHTML(ad.main_title||"")}</div>
  `;

  imgBox.appendChild(wrap);
}

      if(ad.type==="text"){
        const a=document.createElement("a");
        a.className="text-ad ad-item";
        a.href=ad.link_url||"#";
        a.target="_blank";
        a.innerText=ad.title||"텍스트광고";
        a.setAttribute("data-title",(ad.title||"").toLowerCase());
        txtBox.appendChild(a);
      }

      if(ad.type==="square"){
        const wrap=document.createElement("div");
        wrap.className="ad-item";
        wrap.setAttribute("data-title",(ad.main_title||"").toLowerCase());

const link = ad.link_url 
  ? `<a href="${ad.link_url}" target="_blank">
       <img src="${ad.image_url}" alt="${ad.main_title||'延边广告'}">
     </a>`
  : ad.video_url
  ? `<img src="${ad.image_url}" onclick="openVideoModal('${ad.video_url}')">`
  : `<img src="${ad.image_url}" onclick="openImageModal('${ad.image_url}')">`;

        wrap.innerHTML=`
          <div class="square-ad">${link}</div>
          <div class="ad-title">${escapeHTML(ad.main_title||"")}</div>
        `;

        bottomBox.appendChild(wrap);
      }

if(ad.type==="sns"){
  const wrap=document.createElement("div");
  wrap.className="ad-item";
  wrap.setAttribute("data-title",(ad.title||"").toLowerCase());

  wrap.innerHTML=`
    <div class="sns-video">
      <img src="${ad.image_url}"
      onclick="openVideoModal('${ad.video_url}')">
    </div>
    <div class="ad-title">${ad.title||""}</div>
  `;

  snsBox.appendChild(wrap);
}

    });
  }

  /* ================= 설정 ================= */

  const { data: settings } = await supabaseClient
    .from("site_settings")
    .select("*")
    .limit(1);

  if(settings && settings.length>0){

    const s=settings[0];

if(s.search_logo){
  document.getElementById("searchLogo").src = s.search_logo;
}

if(s.banner_img){
  bannerBox.innerHTML = `
    ${s.banner_link
      ? `<a href="${s.banner_link}" target="_blank">
           <img src="${s.banner_img}">
         </a>`
      : `<img src="${s.banner_img}">`
    }
    <div id="weatherBox" class="weather-box">날씨 로딩중...</div>
  `;
}

    document.getElementById("ownerName").innerText=s.owner_name||"";
    document.getElementById("siteDescription").innerText=s.site_description||"";

    const snsBox=document.getElementById("ownerSNS");
    snsBox.innerHTML="";

    if(s.owner_instagram)
      snsBox.innerHTML+=`<a href="${s.owner_instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`;

    if(s.owner_youtube)
      snsBox.innerHTML+=`<a href="${s.owner_youtube}" target="_blank"><i class="fab fa-youtube"></i></a>`;

    if(s.owner_blog)
      snsBox.innerHTML+=`<a href="${s.owner_blog}" target="_blank"><i class="fas fa-blog"></i></a>`;
  }

/* ================= 애드센스 ================= */

const adsenseArea=document.getElementById("adsenseArea");

if(adsenseArea){

  const { data: adsense } = await supabaseClient
    .from("ads")
    .select("*")
    .eq("type","adsense")
    .order("sort",{ascending:true});

  adsenseArea.innerHTML="";

  if(adsense){
    adsense.forEach(ad=>{
      const div=document.createElement("div");
      div.className="adsense-block";
      div.innerHTML=ad.code;
      adsenseArea.appendChild(div);
    });
  }

}

}

loadSite();
loadBoard();
setTimeout(loadWeather,2000);

recordVisit();

async function recordVisit(){

  const today = new Date().toLocaleDateString("sv-SE");
  const visited = localStorage.getItem("visit_date");

  if(visited === today) return;

  const { data } = await supabaseClient
    .from("site_visits")
    .select("*")
    .eq("date", today);

  if(data && data.length > 0){

    const count = data[0].count || 0;

    await supabaseClient
      .from("site_visits")
      .update({ count: count + 1 })
      .eq("date", today);

  }else{

    await supabaseClient
      .from("site_visits")
      .insert([{ date: today, count: 1 }]);

  }

  localStorage.setItem("visit_date", today);
}

async function loadBoard(){

  const noticeList = document.getElementById("noticeList");
  const regionList = document.getElementById("regionList");

  /* 지역정보만 로딩 느낌 주기 */
  regionList.innerHTML = "불러오는중...";
  noticeList.innerHTML = "";

  /* ---------------- 공지글은 전체 고정 ---------------- */
  const { data: noticePosts } = await supabaseClient
    .from("board_posts")
    .select("*")
    .in("category", ["공지","공지글","이벤트"])
    .order("id",{ascending:false});

  /* ---------------- 지역정보만 카테고리 적용 ---------------- */
  let regionQuery = supabaseClient
    .from("board_posts")
    .select("*")
    .order("id",{ascending:false})
    .not("category","in",'("공지","공지글","이벤트")');

  if(currentCategory !== "전체"){
    regionQuery = regionQuery.eq("category", currentCategory);
  }

  const { data: regionPosts } = await regionQuery;

  /* ---------------- 출력 ---------------- */
  renderBoardList(
    noticePosts || [],
    noticeList,
    noticePage,
    "notice"
  );

  renderBoardList(
    regionPosts || [],
    regionList,
    regionPage,
    "region"
  );
}

function renderBoardList(list, target, page, type){

  target.innerHTML = "";

const pageSize =
  window.innerWidth <= 768
    ? (type === "notice" ? 5 : 11)
    : boardPageSize;

const start = (page - 1) * pageSize;
const end = start + pageSize;

  const pageItems = list.slice(start, end);

  pageItems.forEach(post => {

    const div = document.createElement("div");
    div.innerText = `[${post.category}] ${post.title}`;

    div.onclick = () => {
      const date = new Date(post.created_at)
        .toLocaleDateString("ko-KR");

      supabaseClient.rpc('increment_views', {
        post_id: post.id
      });

      openModal(
        post.title,
        post.content,
        date,
        (post.views || 0) + 1
      );
    };

    target.appendChild(div);
  });

renderBoardPagination(list.length, type, list, target);
}

function renderBoardPagination(totalCount, type, list, target){

  let container;

  if(type === "notice"){
    container = document.getElementById("noticePagination");
  } else {
    container = document.getElementById("regionPagination");
  }

  container.innerHTML = "";

const pageSize =
  window.innerWidth <= 768
    ? (type === "notice" ? 5 : 11)
    : boardPageSize;

const totalPages = Math.ceil(totalCount / pageSize);

  // 현재 페이지 확인
  let current = (type === "notice") ? noticePage : regionPage;

  // ===== 10개씩 그룹 =====
  const groupSize = window.innerWidth <= 768 ? 5 : 10;
  const group = Math.ceil(current / groupSize);

  const startPage = (group - 1) * groupSize + 1;
  const endPage = Math.min(startPage + groupSize - 1, totalPages);

  // 이전 버튼
  if(startPage > 1){
    const prev = document.createElement("button");
    prev.innerText = "이전";

    prev.onclick = () => {
      if(type === "notice"){
        noticePage = startPage - 1;
      }else{
        regionPage = startPage - 1;
      }

      renderBoardList(
        list,
        target,
        (type === "notice") ? noticePage : regionPage,
        type
      );
    };

    container.appendChild(prev);
  }

  // 페이지 번호
  for(let i = startPage; i <= endPage; i++){

    const btn = document.createElement("button");
    btn.innerText = i;

    if(i === current){
      btn.style.background = "#87CEEB";
      btn.style.color = "#fff";
    }

    btn.onclick = () => {

      if(type === "notice"){
        noticePage = i;
      }else{
        regionPage = i;
      }

      renderBoardList(list, target, i, type);
    };

    container.appendChild(btn);
  }

  // 다음 버튼
  if(endPage < totalPages){
    const next = document.createElement("button");
    next.innerText = "다음";

    next.onclick = () => {

      if(type === "notice"){
        noticePage = endPage + 1;
      }else{
        regionPage = endPage + 1;
      }

      renderBoardList(
        list,
        target,
        (type === "notice") ? noticePage : regionPage,
        type
      );
    };

    container.appendChild(next);
  }
}

function boardSearch(){

  const keyword = document
    .getElementById("boardSearchInput")
    .value
    .trim()
    .toLowerCase();

  const items = document.querySelectorAll(".board-list div");

  let found = false;

  items.forEach(item => {

    const text = item.innerText.toLowerCase();

    if(keyword === "" || text.includes(keyword)){
      item.style.display = "block";
      found = true;
    } else {
      item.style.display = "none";
    }

  });

}

function search(){

  const keyword=document.getElementById("searchInput")
    .value.trim().toLowerCase();

  if(!keyword) return;

  let found=false;

  /* ===== 광고 검색 ===== */
  const ads=document.querySelectorAll(".ad-item");

  ads.forEach(ad=>{
    ad.classList.remove("highlight");

    const title=ad.getAttribute("data-title");

    if(title && title.includes(keyword)){
      ad.classList.add("highlight");
      found=true;
      ad.scrollIntoView({behavior:"smooth", block:"center"});
    }
  });

  /* ===== 게시판 검색 ===== */
  const boards=document.querySelectorAll(".board-card");

  boards.forEach(board=>{
    board.classList.remove("highlight");

    const text=board.innerText.toLowerCase();

    if(text.includes(keyword)){
      board.classList.add("highlight");
      found=true;
      board.scrollIntoView({behavior:"smooth", block:"center"});
    }
  });

  if(!found){
    alert("검색 결과 없음");
  }
}

  document.getElementById("boardModal").style.display="none";
}

async function submitPost(){

  const title=document.getElementById("userPostTitle").value.trim();
  const content=document.getElementById("userPostContent").value.trim();
  const category=document.getElementById("userPostCategory").value;

const answer = document
  .getElementById("captchaAnswer")
  .value.trim();

if(parseInt(answer) !== captchaValue){
  alert("자동등록방지 정답이 틀렸습니다");
  generateCaptcha();
  return;
}

  if(!title||!content){
    alert("제목과 내용을 입력하세요");
    return;
  }

  const {error}=await supabaseClient
  .from("board_posts")
  .insert([{
    title:title,
    content:content,
    category:category
  }]);

  if(error){
    alert("등록 실패");
    return;
  }

  alert("게시글 등록 완료");

  closeWritePost();
  loadBoard();

}

async function loadWeather(){

  const box = document.getElementById("weatherBox");
  const banner = document.getElementById("topBanner");

  if(!box || !banner) return;

  banner.className = "top-banner";

  try{
    const res = await fetch("https://wttr.in/42.88,129.51?format=j1");
    const data = await res.json();

    const current = data.current_condition[0];

    const temp  = current.temp_C;
    const feels = current.FeelsLikeC;

    const raw = current.weatherDesc[0].value;

    const weatherMap = {
      "Sunny":"맑음",
      "Clear":"맑음",
      "Partly cloudy":"구름 조금",
      "Cloudy":"흐림",
      "Overcast":"흐림",
      "Mist":"안개",
      "Fog":"안개",

      "Patchy rain nearby":"근처에 비",
      "Patchy light rain":"약한 비",
      "Light rain":"약한 비",
      "Moderate rain":"비",
      "Heavy rain":"폭우",
      "Patchy rain possible":"비 가능성",
      "Drizzle":"이슬비",

      "Patchy snow nearby":"근처에 눈",
      "Light snow":"약한 눈",
      "Moderate snow":"눈",
      "Heavy snow":"폭설",

      "Thundery outbreaks nearby":"천둥 가능성",
      "Thunderstorm":"천둥번개"
    };

    const desc = weatherMap[raw] || raw;

    box.innerHTML = `
      <div>
        연변조선족자치주 ${temp}°C
        <div style="font-size:11px;color:#ddd;">
          체감 ${feels}°C · ${desc}
        </div>
      </div>
    `;

  }catch(e){
    box.innerText = "날씨 오류";
  }
}
