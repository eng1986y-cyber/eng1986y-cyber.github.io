<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="renderer" content="webkit">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="applicable-device" content="pc,mobile">

<title>延边信息搜索网_延边生活信息平台_연변정보공유 플랫폼</title>

<meta name="keywords" content="延边信息搜索,延边生活信息,延边招聘,延边房产,延边二手市场,延边网站导航,延边朝鲜族信息平台">
<meta name="description" content="연변 생활정보, 구인구직, 부동산, 중고거래, 광고홍보, 지역게시판 제공 플랫폼">
<meta name="robots" content="index,follow">
<meta name="author" content="yb365.info">
<meta name="theme-color" content="#87CEEB">

<link rel="canonical" href="https://yb365.info">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Microsoft YaHei",sans-serif;
background:#f5f5f5;
color:#222;
overflow-y:scroll;
}

html.modal-open,
body.modal-open{
overflow:hidden !important;
height:100% !important;
touch-action:none;
overscroll-behavior:none;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* 검색 */
.search-box{
display:flex;
align-items:center;
gap:8px;
margin-bottom:25px;
}

.search-logo{
height:46px;
border-radius:8px;
}

.search-box input{
flex:1;
height:46px;
padding:0 14px;
border:2px solid #87CEEB;
border-radius:8px;
font-size:16px;
}

.search-box button{
width:120px;
height:46px;
border:none;
border-radius:8px;
background:#87CEEB;
color:#fff;
font-weight:700;
cursor:pointer;
}

/* 배너 */
.top-banner{
position:relative;
height:240px;
border-radius:14px;
overflow:hidden;
margin-bottom:25px;
background:#ddd;
}

.top-banner img{
width:100%;
height:100%;
object-fit:cover;
}

.weather-box{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,.55);
color:#fff;
padding:6px 10px;
border-radius:8px;
font-size:12px;
z-index:2;
}

/* 광고 */
.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
margin-bottom:22px;
}

.ad-item{
display:flex;
flex-direction:column;
gap:8px;
}

.img-ad,
.square-ad,
.sns-video{
border:1px solid #ddd;
border-radius:12px;
overflow:hidden;
background:#fff;
}

.img-ad{height:100px}
.square-ad{aspect-ratio:1/1}
.sns-video{aspect-ratio:4/5}

.img-ad img,
.square-ad img,
.sns-video img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

.text-ad{
display:flex;
justify-content:center;
align-items:center;
background:#fff;
border:1px solid #ddd;
border-radius:10px;
padding:12px;
min-height:70px;
text-align:center;
text-decoration:none;
color:#222;
}

.ad-title{
font-size:14px;
text-align:center;
line-height:1.4;
}

/* 게시판 */
.board-search{
display:flex;
gap:8px;
margin:30px 0 14px;
}

.board-search input{
flex:1;
height:40px;
padding:0 12px;
border:1px solid #ccc;
border-radius:8px;
}

.board-search button{
height:40px;
padding:0 16px;
border:none;
border-radius:8px;
background:#87CEEB;
color:#fff;
}

.board-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:14px;
flex-wrap:wrap;
}

.board-category{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.board-category button,
.write-btn{
padding:8px 14px;
border-radius:20px;
border:1px solid #ddd;
background:#fff;
cursor:pointer;
}

.board-category button.active{
background:#87CEEB;
color:#fff;
border-color:#87CEEB;
}

.write-btn{
background:#87CEEB;
color:#fff;
}

.board-section{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
min-height:420px;
}

.board-card{
background:#fff;
border:1px solid #ddd;
border-radius:12px;
padding:10px;
cursor:pointer;
transition:.2s;
}

.board-card:hover{
border-color:#87CEEB;
}

.board-card h3{
font-size:14px;
margin-bottom:6px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.board-preview{
font-size:13px;
color:#666;
height:36px;
overflow:hidden;
}

.board-meta{
font-size:12px;
color:#999;
margin-top:8px;
}

#pagination{
text-align:center;
margin-top:18px;
}

#pagination button{
margin:4px;
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* 하단 */
.site-description{
margin-top:40px;
padding:25px;
background:#fff;
border:1px solid #ddd;
border-radius:14px;
text-align:center;
line-height:1.7;
}

.owner-box{
margin-top:24px;
padding-bottom:50px;
text-align:center;
}

.owner-name{
font-weight:700;
margin-bottom:12px;
}

.owner-sns{
display:flex;
justify-content:center;
gap:10px;
}

.owner-sns a{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#87CEEB;
color:#fff;
text-decoration:none;
}

/* 모달 */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
justify-content:center;
align-items:center;
z-index:99999;
padding:20px;
}

.modal.show{
display:flex;
}

.modal-box{
width:100%;
max-width:620px;
max-height:90vh;
overflow:auto;
background:#fff;
border-radius:16px;
padding:24px;
position:relative;
}

.close-btn{
position:absolute;
top:12px;
right:14px;
font-size:20px;
cursor:pointer;
}

.modal-img{
width:100%;
border-radius:12px;
}

#modalVideo{
width:100%;
height:60vh;
border:none;
}

/* 모바일 */
@media(max-width:768px){

.container{padding:15px}

.search-box{
flex-direction:column;
}

.search-box input,
.search-box button{
width:100%;
}

.top-banner{
height:110px;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

.board-section{
grid-template-columns:repeat(2,1fr);
gap:6px;
}

.board-top{
flex-direction:column;
align-items:stretch;
}

.write-btn{
width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<div class="search-box">
<img id="searchLogo" class="search-logo" src="">
<input id="searchInput" placeholder="검색어 입력 / 输入关键词">
<button onclick="searchSite()">검색</button>
</div>

<div class="top-banner" id="topBanner">
<div class="weather-box" id="weatherBox">날씨 로딩중...</div>
</div>

<div class="grid" id="imageAds"></div>
<div class="grid" id="textAds"></div>
<div class="grid" id="bottomImageAds"></div>
<div class="grid" id="snsVideoAds"></div>

<div class="board-search">
<input id="boardKeyword" placeholder="게시판 검색">
<button onclick="searchBoard()">검색</button>
</div>

<div class="board-top">
<div class="board-category" id="categoryBar"></div>
<button class="write-btn" onclick="openWrite()">글쓰기</button>
</div>

<div class="board-section" id="boardSection"></div>
<div id="pagination"></div>

<div class="site-description" id="siteDescription"></div>

<div class="owner-box">
<div class="owner-name" id="ownerName"></div>
<div class="owner-sns" id="ownerSNS"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const CATEGORYS=["전체","연길","훈춘","화룡","룡정","왕청","도문","돈화","안도","불편신고"];
let currentCategory="전체";
let currentPage=1;
let pageSize=window.innerWidth<=768?6:12;

/* 스크롤 */
function lockBody(){
document.documentElement.classList.add("modal-open");
document.body.classList.add("modal-open");
}
function unlockBody(){
document.documentElement.classList.remove("modal-open");
document.body.classList.remove("modal-open");
}

/* 카테고리 */
function renderCategory(){
const bar=document.getElementById("categoryBar");
bar.innerHTML="";
CATEGORYS.forEach(cat=>{
const btn=document.createElement("button");
btn.innerText=cat;
if(cat===currentCategory) btn.classList.add("active");
btn.onclick=()=>{
currentCategory=cat;
currentPage=1;
renderCategory();
loadBoard();
};
bar.appendChild(btn);
});
}

/* 광고 */
async function loadAds(){
const {data}=await supabaseClient.from("ads").select("*").order("id",{ascending:true});
const ads=data||[];

imageAds.innerHTML="";
textAds.innerHTML="";
bottomImageAds.innerHTML="";
snsVideoAds.innerHTML="";

ads.forEach(ad=>{
const t=(ad.type||"").toLowerCase();

if(t==="image"){
imageAds.innerHTML+=`
<div class="ad-item">
<div class="img-ad"><img src="${ad.image_url||''}" onclick="openImage('${ad.image_url||''}')"></div>
<div class="ad-title">${ad.main_title||''}</div>
</div>`;
}

if(t==="text"){
textAds.innerHTML+=`
<a class="text-ad" href="${ad.link_url||'#'}" target="_blank">${ad.title||'광고'}</a>`;
}

if(t==="square"){
bottomImageAds.innerHTML+=`
<div class="ad-item">
<div class="square-ad"><img src="${ad.image_url||''}" onclick="openImage('${ad.image_url||''}')"></div>
<div class="ad-title">${ad.main_title||''}</div>
</div>`;
}

if(t==="sns"){
snsVideoAds.innerHTML+=`
<div class="ad-item">
<div class="sns-video"><img src="${ad.image_url||''}" onclick="openVideo('${ad.video_url||''}')"></div>
<div class="ad-title">${ad.title||''}</div>
</div>`;
}

});
}

/* 설정 */
async function loadSite(){
const {data}=await supabaseClient.from("site_settings").select("*").limit(1);
if(!data || !data.length) return;

const s=data[0];

if(s.search_logo) searchLogo.src=s.search_logo;

if(s.banner_img){
topBanner.innerHTML=`
${s.banner_link?`<a href="${s.banner_link}" target="_blank"><img src="${s.banner_img}"></a>`:`<img src="${s.banner_img}">`}
<div class="weather-box" id="weatherBox">날씨 로딩중...</div>`;
}

ownerName.innerText=s.owner_name||"延边信息搜索网";
siteDescription.innerText=s.site_description||"연변 생활정보 플랫폼";

ownerSNS.innerHTML="";

if(s.owner_instagram) ownerSNS.innerHTML+=`<a href="${s.owner_instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`;
if(s.owner_youtube) ownerSNS.innerHTML+=`<a href="${s.owner_youtube}" target="_blank"><i class="fab fa-youtube"></i></a>`;
if(s.owner_blog) ownerSNS.innerHTML+=`<a href="${s.owner_blog}" target="_blank"><i class="fas fa-blog"></i></a>`;
}

/* 게시판 */
async function loadBoard(){

let query=supabaseClient
.from("board_posts")
.select("*",{count:"exact"})
.order("id",{ascending:false});

if(currentCategory!=="전체"){
query=query.eq("category",currentCategory);
}

const from=(currentPage-1)*pageSize;
const to=from+pageSize-1;

const {data,count}=await query.range(from,to);

boardSection.innerHTML="";

if(!data || !data.length){
boardSection.innerHTML="<div style='padding:30px'>게시글이 없습니다.</div>";
pagination.innerHTML="";
return;
}

data.forEach(post=>{

const date=new Date(post.created_at).toLocaleDateString("ko-KR");

boardSection.innerHTML+=`
<div class="board-card"
onclick="openPost('${encodeURIComponent(post.title)}','${encodeURIComponent(post.content)}','${date}','${post.views||0}','${post.id}')">

<h3>[${post.category}] ${post.title}</h3>
<div class="board-preview">${post.content}</div>
<div class="board-meta">${date} · 조회 ${post.views||0}</div>

</div>`;
});

renderPagination(count);
}

function renderPagination(total){

pagination.innerHTML="";

const totalPage=Math.ceil(total/pageSize);

for(let i=1;i<=totalPage;i++){
const btn=document.createElement("button");
btn.innerText=i;

if(i===currentPage){
btn.style.background="#87CEEB";
btn.style.color="#fff";
}

btn.onclick=()=>{
currentPage=i;
loadBoard();
window.scrollTo({top:0,behavior:"smooth"});
};

pagination.appendChild(btn);
}
}

/* 검색 */
function searchSite(){
const key=searchInput.value.trim().toLowerCase();
if(!key) return;

let found=false;

document.querySelectorAll(".ad-title,.text-ad,.board-card").forEach(el=>{
if(el.innerText.toLowerCase().includes(key)){
el.scrollIntoView({behavior:"smooth",block:"center"});
found=true;
}
});

if(!found) alert("검색 결과 없음");
}

/* 게시판검색 */
async function searchBoard(){

const key=boardKeyword.value.trim();
if(!key) return;

const {data}=await supabaseClient
.from("board_posts")
.select("*")
.or(`title.ilike.%${key}%,content.ilike.%${key}%`)
.limit(30);

boardSection.innerHTML="";

if(!data || !data.length){
alert("검색 결과 없음");
return;
}

data.forEach(post=>{
const date=new Date(post.created_at).toLocaleDateString("ko-KR");

boardSection.innerHTML+=`
<div class="board-card"
onclick="openPost('${encodeURIComponent(post.title)}','${encodeURIComponent(post.content)}','${date}','${post.views||0}','${post.id}')">
<h3>[${post.category}] ${post.title}</h3>
<div class="board-preview">${post.content}</div>
<div class="board-meta">${date}</div>
</div>`;
});

pagination.innerHTML="";
}

/* 모달 */
function openImage(url){
globalModal.classList.add("show");
modalBody.innerHTML=`<img src="${url}" class="modal-img">`;
lockBody();
}

function openVideo(url){
globalModal.classList.add("show");
modalBody.innerHTML=`<iframe id="modalVideo" src="${url}" allowfullscreen></iframe>`;
lockBody();
}

async function openPost(t,c,d,v,id){

const title=decodeURIComponent(t);
const content=decodeURIComponent(c);

globalModal.classList.add("show");
modalBody.innerHTML=`
<h2 style="margin-bottom:10px">${title}</h2>
<div style="font-size:12px;color:#888;margin-bottom:15px">${d} · 조회 ${v}</div>
<div style="line-height:1.7">${content}</div>
`;

lockBody();

await supabaseClient
.from("board_posts")
.update({views:Number(v)+1})
.eq("id",id);
}

function closeModal(){
globalModal.classList.remove("show");
modalBody.innerHTML="";
unlockBody();
}

/* 글쓰기 */
function openWrite(){

globalModal.classList.add("show");

modalBody.innerHTML=`
<h2 style="margin-bottom:15px">글쓰기</h2>

<input id="wTitle" placeholder="제목"
style="width:100%;height:42px;margin-bottom:10px;padding:0 10px">

<select id="wCategory"
style="width:100%;height:42px;margin-bottom:10px">
${CATEGORYS.filter(x=>x!=="전체").map(x=>`<option>${x}</option>`).join("")}
</select>

<textarea id="wContent"
style="width:100%;height:140px;padding:10px"
placeholder="내용"></textarea>

<button onclick="submitPost()"
style="width:100%;height:44px;margin-top:12px;border:none;background:#87CEEB;color:#fff;border-radius:8px">
등록하기
</button>
`;

lockBody();
}

async function submitPost(){

const title=document.getElementById("wTitle").value.trim();
const category=document.getElementById("wCategory").value;
const content=document.getElementById("wContent").value.trim();

if(!title || !content){
alert("제목과 내용을 입력하세요");
return;
}

const {error}=await supabaseClient
.from("board_posts")
.insert([{title,category,content}]);

if(error){
alert("등록 실패");
return;
}

alert("등록 완료");
closeModal();
loadBoard();
}

/* 날씨 */
async function loadWeather(){
try{
const res=await fetch("https://wttr.in/42.88,129.51?format=j1");
const data=await res.json();
const c=data.current_condition[0];
const box=document.getElementById("weatherBox");
if(box) box.innerHTML=`연변 ${c.temp_C}°C`;
}catch(e){}
}

/* 시작 */
window.addEventListener("DOMContentLoaded",async()=>{

renderCategory();

await loadSite();
await loadAds();
await loadBoard();

loadWeather();

});

</script>

<div class="modal" id="globalModal" onclick="if(event.target===this)closeModal()">
<div class="modal-box">
<div class="close-btn" onclick="closeModal()">✕</div>
<div id="modalBody"></div>
</div>
</div>

</body>
</html>
