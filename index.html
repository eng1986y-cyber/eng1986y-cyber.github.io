<script>

/* =========================
기본 변수
========================= */
let captchaValue = 0;
let currentCategory = "전체";
let currentPage = 1;
let pageGroup = 1;
let pageGroupSize = 5;
let pageSize = window.innerWidth <= 768 ? 6 : 12;

/* =========================
공통
========================= */
function lockSite(){
  document.body.classList.add("modal-open");
}

function unlockSite(){
  document.body.classList.remove("modal-open");
}

function escapeHTML(str){
  if(!str) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* =========================
스크롤 버튼
========================= */
function scrollToTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}

function scrollToBottom(){
  window.scrollTo({
    top:document.documentElement.scrollHeight,
    behavior:"smooth"
  });
}

function focusSearch(){
  document.getElementById("searchInput").focus();
}

/* =========================
캡챠
========================= */
function generateCaptcha(){

  const a = Math.floor(Math.random()*9)+1;
  const b = Math.floor(Math.random()*9)+1;

  captchaValue = a+b;

  document.getElementById("captchaQuestion").innerText =
    a + " + " + b + " = ?";
}

/* =========================
카테고리
========================= */
function filterCategory(cat,el){

  currentCategory = cat;
  currentPage = 1;
  pageGroup = 1;

  document
    .querySelectorAll(".board-category button")
    .forEach(btn=>btn.classList.remove("active"));

  el.classList.add("active");

  loadBoard();
}

/* =========================
모달 - 이미지
========================= */
function openImageModal(url){

  document.getElementById("modalAdImage").src = url;
  document.getElementById("imageModal").style.display="flex";

  lockSite();
}

function closeImageModal(){

  document.getElementById("imageModal").style.display="none";
  document.getElementById("modalAdImage").src="";

  unlockSite();
}

/* =========================
모달 - 영상
========================= */
function openVideoModal(url){

  if(!url) return;

  let embed = "";

  if(url.includes("youtube.com") || url.includes("youtu.be")){

    let id="";

    if(url.includes("watch")){
      id = new URL(url).searchParams.get("v");
    }else if(url.includes("shorts")){
      id = url.split("shorts/")[1];
    }else{
      id = url.split("/").pop();
    }

    embed =
    "https://www.youtube.com/embed/"+id+"?autoplay=1";

  }else if(url.includes("vimeo.com")){

    let id = url.split("/").pop();

    embed =
    "https://player.vimeo.com/video/"+id;

  }else{
    embed = url;
  }

  document.getElementById("modalVideo").src = embed;
  document.getElementById("videoModal").style.display="flex";

  lockSite();
}

function closeVideoModal(){

  document.getElementById("modalVideo").src="";
  document.getElementById("videoModal").style.display="none";

  unlockSite();
}

/* =========================
모달 - 게시판 상세
========================= */
function openModal(title,content,date,views){

  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalContent").innerText = content;
  document.getElementById("modalMeta").innerText =
    date + " · 조회 " + views;

  document.getElementById("boardModal").style.display="flex";

  lockSite();
}

function closeModal(){

  document.getElementById("boardModal").style.display="none";

  unlockSite();
}

/* =========================
글쓰기 모달
========================= */
function openWritePost(){

  document.getElementById("writeModal").style.display="flex";
  document.getElementById("captchaAnswer").value="";

  generateCaptcha();
  lockSite();
}

function closeWritePost(){

  document.getElementById("writeModal").style.display="none";

  unlockSite();
}

/* =========================
검색결과 팝업
========================= */
function closeSearchResult(){

  document.getElementById("searchResultModal")
    .style.display="none";

  unlockSite();
}

/* =========================
메인 검색
========================= */
function search(){

  const keyword =
  document.getElementById("searchInput")
  .value.trim().toLowerCase();

  if(!keyword) return;

  let found=false;

  document.querySelectorAll(".ad-item").forEach(ad=>{

    ad.classList.remove("highlight");

    const title =
    (ad.getAttribute("data-title")||"").toLowerCase();

    if(title.includes(keyword)){
      ad.classList.add("highlight");
      ad.scrollIntoView({
        behavior:"smooth",
        block:"center"
      });
      found=true;
    }
  });

  document.querySelectorAll(".board-card")
  .forEach(card=>{

    card.classList.remove("highlight");

    if(card.innerText.toLowerCase().includes(keyword)){
      card.classList.add("highlight");
      card.scrollIntoView({
        behavior:"smooth",
        block:"center"
      });
      found=true;
    }
  });

  if(!found){
    alert("검색 결과 없음");
  }
}

/* =========================
게시판 불러오기
========================= */
async function loadBoard(){

  const board =
  document.getElementById("boardSection");

  board.innerHTML="";

  const start = (currentPage-1) * pageSize;
  const end   = start + pageSize - 1;

  let query = supabaseClient
    .from("board_posts")
    .select("*")
    .order("id",{ascending:false});

  if(currentCategory !== "전체"){
    query = query.eq("category",currentCategory);
  }

  const { data:posts } =
  await query.range(start,end);

  if(posts){

    posts.forEach(post=>{

      const div = document.createElement("div");
      div.className="board-card";

      const date =
      new Date(post.created_at)
      .toLocaleDateString("ko-KR");

      div.innerHTML = `
        <h3>[${post.category||"일반"}]
        ${escapeHTML(post.title)}</h3>

        <div class="board-preview">
        ${escapeHTML(post.content)}
        </div>

        <div style="
        font-size:11px;
        color:#999;
        margin-top:6px;">
        ${date} · 조회 ${post.views||0}
        </div>
      `;

      div.onclick = async ()=>{

        await supabaseClient.rpc(
          "increment_views",
          {post_id:post.id}
        );

        post.views = (post.views||0)+1;

        openModal(
          post.title,
          post.content,
          date,
          post.views
        );
      };

      board.appendChild(div);

    });

  }

  loadPagination();
}

/* =========================
페이지네이션
========================= */
async function loadPagination(){

  let query = supabaseClient
    .from("board_posts")
    .select("*",{count:"exact",head:true});

  if(currentCategory !== "전체"){
    query = query.eq("category",currentCategory);
  }

  const { count } = await query;

  const totalPages =
  Math.ceil(count / pageSize);

  const wrap =
  document.getElementById("pagination");

  wrap.innerHTML="";

  const startPage =
  (pageGroup-1)*pageGroupSize + 1;

  const endPage =
  Math.min(
    startPage+pageGroupSize-1,
    totalPages
  );

  if(pageGroup > 1){

    const prev =
    document.createElement("button");

    prev.innerText="<<";

    prev.onclick=()=>{
      pageGroup--;
      loadPagination();
    };

    wrap.appendChild(prev);
  }

  for(let i=startPage;i<=endPage;i++){

    const btn =
    document.createElement("button");

    btn.innerText=i;

    if(i===currentPage){
      btn.style.background="#87CEEB";
      btn.style.color="#fff";
    }

    btn.onclick=()=>{
      currentPage=i;
      loadBoard();
    };

    wrap.appendChild(btn);
  }

  if(endPage < totalPages){

    const next =
    document.createElement("button");

    next.innerText=">>";

    next.onclick=()=>{
      pageGroup++;
      loadPagination();
    };

    wrap.appendChild(next);
  }
}

/* =========================
게시판 검색
========================= */
async function boardSearch(){

  const keyword =
  document.getElementById("boardSearchInput")
  .value.trim();

  if(!keyword) return;

  const { data:posts } =
  await supabaseClient
    .from("board_posts")
    .select("*")
    .or(
      `title.ilike.%${keyword}%,
       content.ilike.%${keyword}%`
    )
    .order("id",{ascending:false})
    .limit(20);

  if(!posts || posts.length===0){
    alert("검색 결과 없음");
    return;
  }

  const list =
  document.getElementById("searchResultList");

  list.innerHTML="";

  posts.forEach(post=>{

    const div =
    document.createElement("div");

    div.style.padding="10px";
    div.style.borderBottom=
    "1px solid #eee";

    div.style.cursor="pointer";

    div.innerHTML=
    `[${post.category}] ${post.title}`;

    div.onclick=()=>{

      closeSearchResult();

      const date =
      new Date(post.created_at)
      .toLocaleDateString("ko-KR");

      openModal(
        post.title,
        post.content,
        date,
        post.views||0
      );
    };

    list.appendChild(div);

  });

  document.getElementById(
    "searchResultModal"
  ).style.display="flex";

  lockSite();
}

/* =========================
게시글 등록
========================= */
async function submitPost(){

  const title =
  document.getElementById(
    "userPostTitle"
  ).value.trim();

  const content =
  document.getElementById(
    "userPostContent"
  ).value.trim();

  const category =
  document.getElementById(
    "userPostCategory"
  ).value;

  const answer =
  parseInt(
    document.getElementById(
      "captchaAnswer"
    ).value.trim()
  );

  if(answer !== captchaValue){
    alert("자동등록방지 정답 오류");
    generateCaptcha();
    return;
  }

  if(!title || !content){
    alert("제목과 내용을 입력하세요");
    return;
  }

  const { error } =
  await supabaseClient
    .from("board_posts")
    .insert([{
      title:title,
      content:content,
      category:category
    }]);

  if(error){
    alert("등록 실패");
    return;
  }

  alert("등록 완료");

  closeWritePost();
  loadBoard();
}

/* =========================
광고 + 사이트 설정 로드
========================= */
async function loadSite(){

  const imageAds   = document.getElementById("imageAds");
  const textAds    = document.getElementById("textAds");
  const squareAds  = document.getElementById("bottomImageAds");
  const snsAds     = document.getElementById("snsVideoAds");
  const topBanner  = document.getElementById("topBanner");

  imageAds.innerHTML="";
  textAds.innerHTML="";
  squareAds.innerHTML="";
  snsAds.innerHTML="";

  /* 광고 불러오기 */
  const { data:ads } =
  await supabaseClient
    .from("ads")
    .select("*")
    .order("id",{ascending:true});

  if(ads){

    ads.forEach(ad=>{

      /* 상단 이미지 광고 */
      if(ad.type==="image"){

        const wrap =
        document.createElement("div");

        wrap.className="ad-item";
        wrap.setAttribute(
          "data-title",
          (ad.main_title||"").toLowerCase()
        );

        wrap.innerHTML = `
          <div class="img-ad">
            <img
              src="${ad.image_url}"
              onclick="${
                ad.video_url
                ? `openVideoModal('${ad.video_url}')`
                : `openImageModal('${ad.image_url}')`
              }">
          </div>

          <div class="ad-title">
            ${escapeHTML(ad.main_title||"")}
          </div>
        `;

        imageAds.appendChild(wrap);
      }

      /* 텍스트 광고 */
      if(ad.type==="text"){

        const a =
        document.createElement("a");

        a.className="text-ad ad-item";
        a.href=ad.link_url||"#";
        a.target="_blank";
        a.innerText=ad.title||"텍스트광고";

        a.setAttribute(
          "data-title",
          (ad.title||"").toLowerCase()
        );

        textAds.appendChild(a);
      }

      /* 정방형 광고 */
      if(ad.type==="square"){

        const wrap =
        document.createElement("div");

        wrap.className="ad-item";

        wrap.setAttribute(
          "data-title",
          (ad.main_title||"").toLowerCase()
        );

        wrap.innerHTML = `
          <div class="square-ad">
            <img
              src="${ad.image_url}"
              onclick="${
                ad.video_url
                ? `openVideoModal('${ad.video_url}')`
                : `openImageModal('${ad.image_url}')`
              }">
          </div>

          <div class="ad-title">
            ${escapeHTML(ad.main_title||"")}
          </div>
        `;

        squareAds.appendChild(wrap);
      }

      /* sns 광고 */
      if(ad.type==="sns"){

        const wrap =
        document.createElement("div");

        wrap.className="ad-item";

        wrap.setAttribute(
          "data-title",
          (ad.title||"").toLowerCase()
        );

        wrap.innerHTML = `
          <div class="sns-video">
            <img
              src="${ad.image_url}"
              onclick="openVideoModal('${ad.video_url}')">
          </div>

          <div class="ad-title">
            ${escapeHTML(ad.title||"")}
          </div>
        `;

        snsAds.appendChild(wrap);
      }

    });

  }

  /* 사이트 설정 */
  const { data:setting } =
  await supabaseClient
    .from("site_settings")
    .select("*")
    .limit(1);

  if(setting && setting.length){

    const s = setting[0];

    if(s.search_logo){
      document.getElementById(
        "searchLogo"
      ).src = s.search_logo;
    }

    if(s.banner_img){

      topBanner.innerHTML = `
        <img src="${s.banner_img}">
        <div
        id="weatherBox"
        class="weather-box">
        날씨 로딩중...
        </div>
      `;
    }

    document.getElementById(
      "ownerName"
    ).innerText =
    s.owner_name || "";

    document.getElementById(
      "siteDescription"
    ).innerText =
    s.site_description || "";

    const sns =
    document.getElementById("ownerSNS");

    sns.innerHTML="";

    if(s.owner_instagram){
      sns.innerHTML += `
      <a href="${s.owner_instagram}"
      target="_blank">
      <i class="fab fa-instagram"></i>
      </a>`;
    }

    if(s.owner_youtube){
      sns.innerHTML += `
      <a href="${s.owner_youtube}"
      target="_blank">
      <i class="fab fa-youtube"></i>
      </a>`;
    }

    if(s.owner_blog){
      sns.innerHTML += `
      <a href="${s.owner_blog}"
      target="_blank">
      <i class="fas fa-blog"></i>
      </a>`;
    }

  }

}

/* =========================
방문자수 기록
========================= */
async function recordVisit(){

  const today =
  new Date().toLocaleDateString("sv-SE");

  const visited =
  localStorage.getItem("visit_date");

  if(visited === today) return;

  const { data } =
  await supabaseClient
    .from("site_visits")
    .select("*")
    .eq("date",today);

  if(data && data.length){

    await supabaseClient
      .from("site_visits")
      .update({
        count:(data[0].count||0)+1
      })
      .eq("date",today);

  }else{

    await supabaseClient
      .from("site_visits")
      .insert([{
        date:today,
        count:1
      }]);
  }

  localStorage.setItem(
    "visit_date",
    today
  );
}

/* =========================
날씨 로드
========================= */
async function loadWeather(){

  const box =
  document.getElementById("weatherBox");

  const banner =
  document.getElementById("topBanner");

  if(!box || !banner) return;

  try{

    const res =
    await fetch(
      "https://wttr.in/42.88,129.51?format=j1"
    );

    const data = await res.json();

    const current =
    data.current_condition[0];

    const temp =
    current.temp_C;

    const feels =
    current.FeelsLikeC;

    let desc =
    current.weatherDesc[0].value;

    const map = {

      "Sunny":"맑음",
      "Clear":"맑음",
      "Partly cloudy":"구름조금",
      "Cloudy":"흐림",
      "Overcast":"흐림",
      "Mist":"안개",
      "Fog":"안개",

      "Light rain":"약한 비",
      "Moderate rain":"비",
      "Heavy rain":"폭우",

      "Light snow":"약한 눈",
      "Heavy snow":"폭설",

      "Thunderstorm":"천둥번개"
    };

    desc = map[desc] || desc;

    box.innerHTML = `
      연변 ${temp}°C
      <div style="
      font-size:11px;
      color:#ddd;">
      체감 ${feels}°C · ${desc}
      </div>
    `;

  }catch(e){

    box.innerText="날씨 오류";

  }

}
