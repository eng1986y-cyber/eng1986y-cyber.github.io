<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보공유 플랫폼</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body{margin:0;padding:20px;font-family:Arial;background:#f5f5f5;overflow-y:scroll;}
.container{max-width:1200px;margin:0 auto;}
.search-box{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:30px;}
.search-box input{width:320px;height:46px;border:2px solid #87CEEB;border-radius:6px;padding:0 12px;font-size:16px;}
.search-box button{height:46px;width:160px;border:none;border-radius:6px;background:#87CEEB;color:#fff;cursor:pointer;}
.search-box button:hover{background:#6bbfe0;}
.board-section{display:grid;grid-template-columns:repeat(6,1fr);row-gap:12px;column-gap:6px;margin-top:20px;margin-bottom:15px;max-height:720px;overflow-y:auto;}
.board-card{background:#fff;border-radius:12px;border:1px solid #ddd;padding:15px;cursor:pointer;transition:0.2s;height:120px;display:flex;flex-direction:column;justify-content:space-between;}
.board-card:hover{transform:translateY(-4px);box-shadow:0 6px 14px rgba(0,0,0,0.1);}
.board-card h3{font-size:14px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.board-preview{font-size:12px;color:#666;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.board-card.highlight{background:#E2C65C;color:#fff;border-color:#C9A227;}
#pagination{text-align:center;margin-top:20px;}
#pagination button{margin:4px;padding:6px 12px;border:none;border-radius:6px;background:#eee;cursor:pointer;}
#pagination button:hover{background:#87CEEB;color:#fff;}
.top-banner{width:100%;height:120px;margin:20px 0 30px;border-radius:14px;overflow:hidden;border:2px solid #87CEEB;}
.top-banner img{width:100%;height:100%;object-fit:cover;}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:40px;}
.img-ad,.square-ad{border-radius:12px;overflow:hidden;border:1px solid #ddd;}
.img-ad img,.square-ad img{width:100%;height:100%;object-fit:cover;}
.text-ad{background:#fff;border:1px solid #ccc;padding:12px;text-align:center;border-radius:8px;text-decoration:none;color:#222;transition:0.2s;display:block;margin-bottom:10px;}
.text-ad:hover{background:#87CEEB;color:#fff;}
.owner-box{margin-top:60px;padding:25px;border-radius:11px;text-align:center;position:relative;}
.owner-name{font-family:'Bahnschrift Light', serif;font-size:11px;font-weight:600;letter-spacing:2px;margin-bottom:11px;color:#222;display:inline-block;}
.owner-sns{position:absolute;right:15px;bottom:15px;display:flex;gap:8px;}
.owner-sns a{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:#fff;border:2px solid #87CEEB;color:#87CEEB;font-size:20px;text-decoration:none;transition:all 0.3s ease;}
.owner-sns a:hover{background:#87CEEB;color:#fff;transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,0.15);}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:9999;}
.modal-content{background:#fff;width:600px;max-width:90%;max-height:80%;overflow:auto;border-radius:14px;padding:25px;position:relative;}
.modal-close{position:absolute;top:12px;right:15px;font-size:20px;cursor:pointer;}
@media(max-width:768px){.board-section{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="container">
  <div class="search-box">
    <input id="searchInput" placeholder="검색어 입력">
    <button onclick="search()">검색</button>
  </div>

  <div class="top-banner" id="topBanner"></div>

  <div class="grid" id="imageAds"></div>
  <div class="grid" id="textAds"></div>
  <div class="grid" id="bottomImageAds"></div>

  <div class="board-section" id="boardSection"></div>
  <div id="pagination"></div>

  <div class="site-description" id="siteDescription"></div>

  <div class="owner-box">
    <div class="owner-name" id="ownerName"></div>
    <div class="owner-sns" id="ownerSNS"></div>
  </div>
</div>

<div class="modal" id="boardModal">
  <div class="modal-content">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <h2 id="modalTitle"></h2>
    <div id="modalMeta" style="font-size:12px;color:#999;margin-bottom:15px;"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let boardLoading=false;
let currentPage=1;
const pageSize=18;

async function loadPagination(){
  const { count } = await supabaseClient.from("board_posts").select("*",{count:"exact"});
  const totalPages=Math.ceil(count/pageSize);
  const pagination=document.getElementById("pagination");
  pagination.innerHTML="";
  for(let i=1;i<=totalPages;i++){
    const btn=document.createElement("button");
    btn.type="button";
    btn.innerText=i;
    if(i===currentPage) btn.style.background="#87CEEB";
    btn.onclick=()=>{currentPage=i;loadBoard();};
    pagination.appendChild(btn);
  }
}

async function loadBoard(){
  if(boardLoading) return;
  boardLoading=true;
  const boardSection=document.getElementById("boardSection");
  boardSection.innerHTML="";
  const start=(currentPage-1)*pageSize;
  const end=start+pageSize-1;
  const { data: posts }=await supabaseClient.from("board_posts").select("*").order("id",{ascending:false}).range(start,end);
  if(posts){
    posts.forEach(post=>{
      const div=document.createElement("div");
      div.className="board-card";
      const date=new Date(post.created_at).toLocaleDateString("ko-KR");
      div.innerHTML=`<h3>${post.title}</h3><div class="board-preview">${post.content}</div><div class="view-count" style="font-size:11px;color:#999;margin-top:6px;">${date} · 조회 ${post.views||0}</div>`;
      div.onclick=async ()=>{
        const newViews=(post.views||0)+1;
        await supabaseClient.from("board_posts").update({views:newViews}).eq("id",post.id);
        openModal(post.title,post.content,date,newViews);
        div.querySelector(".view-count").innerText=`${date} · 조회 ${newViews}`;
        post.views=newViews;
      };
      boardSection.appendChild(div);
    });
  }
  loadPagination();
  boardLoading=false;
}

function openModal(title,content,date,views){
  document.getElementById("modalTitle").innerText=title;
  document.getElementById("modalContent").innerText=content;
  document.getElementById("modalMeta").innerText=`${date} · 조회 ${views}`;
  document.getElementById("boardModal").style.display="flex";
}
function closeModal(){document.getElementById("boardModal").style.display="none";}
document.getElementById("boardModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal();});

function search(){
  const keyword=document.getElementById("searchInput").value.trim().toLowerCase();
  if(!keyword) return alert("검색어를 입력하세요");
  let found=false;

  // 광고 검색
  document.querySelectorAll(".ad-item").forEach(ad=>ad.classList.remove("highlight"));
  document.querySelectorAll(".ad-item").forEach(ad=>{
    const title=(ad.getAttribute("data-title")||"").toLowerCase();
    if(title.includes(keyword)){ad.classList.add("highlight");if(!found)ad.scrollIntoView({behavior:"smooth",block:"center"});found=true;}
  });

  // 게시판 검색
  document.querySelectorAll(".board-card").forEach(card=>card.classList.remove("highlight"));
  document.querySelectorAll(".board-card").forEach(card=>{
    const text=(card.innerText||"").toLowerCase();
    if(text.includes(keyword)){card.classList.add("highlight");if(!found)card.scrollIntoView({behavior:"smooth",block:"center"});found=true;}
  });

  if(!found) alert("검색 결과 없음");
}

// 초기 로드
loadBoard();
</script>
</body>
</html>
