  content:"";
  position:absolute;
  inset:0;
  background: url('https://i.imgur.com/V4RclNb.png'); /* 눈 이미지 */
  opacity:0.5;

  to{ background-position:0 300px; }
}

}

@keyframes flash{
  0%,95%,100%{ filter:brightness(1); }

}

<script>

let captchaValue = 0;

function generateCaptcha(){
  const a = Math.floor(Math.random()*9)+1;
  const b = Math.floor(Math.random()*9)+1;

  captchaValue = a + b;

  document.getElementById("captchaQuestion").innerText =
    a + " + " + b + " = ?";
}

function escapeHTML(str){
  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

let currentCategory = "전체";

function filterCategory(cat, el){
  currentCategory = cat;
  currentPage = 1;
  pageGroup = 1;

  document
    .querySelectorAll(".board-category button")
    .forEach(btn=>btn.classList.remove("active"));

  el.classList.add("active");

  loadBoard();
}

function openImageModal(url){
  const modal = document.getElementById("imageModal");
  const content = modal.querySelector(".modal-content");

  document.getElementById("modalAdImage").src = url;

  // 화면 높이에 맞춰 높이 조정
  const vh = window.innerHeight;
  content.style.maxHeight = vh * 0.9 + "px"; // 화면 90%
  content.style.overflow = "hidden";

  modal.style.display="flex";
}

function closeImageModal(){

  document.getElementById("imageModal").style.display="none";
  document.getElementById("modalAdImage").src="";

}

function openVideoModal(url){

let embed="";

if(!url) return;

/* YouTube */
if(url.includes("youtube.com") || url.includes("youtu.be")){

let videoId="";

if(url.includes("watch")){
const params = new URL(url).searchParams;
videoId = params.get("v");
}
else if(url.includes("shorts")){
videoId = url.split("shorts/")[1];
}
else{
videoId = url.split("/").pop();
}

embed = "https://www.youtube.com/embed/"+videoId+"?autoplay=1";

}

/* Bilibili */
else if(url.includes("bilibili.com")){

let bvid = url.split("/video/")[1];
if(bvid) bvid = bvid.split("?")[0];

embed = "https://player.bilibili.com/player.html?bvid="+bvid+"&autoplay=1";

}

/* iQIYI */
else if(url.includes("iqiyi.com")){

embed = url;

}

/* Youku */
else if(url.includes("youku.com")){

embed = url;

}

/* Vimeo */
else if(url.includes("vimeo.com")){

let id = url.split("/").pop();
embed = "https://player.vimeo.com/video/"+id+"?autoplay=1";

}

/* mp4 직접영상 */
else if(url.endsWith(".mp4")){

document.getElementById("modalVideo").outerHTML =
`<video id="modalVideo" controls autoplay style="width:100%;height:100%">
<source src="${url}" type="video/mp4">
</video>`;

document.getElementById("videoModal").style.display="flex";

return;

}

/* 기본 iframe */
else{
embed=url;
}

document.getElementById("modalVideo").src = embed;
document.getElementById("videoModal").style.display="flex";

}

function closeVideoModal(){

const iframe = document.getElementById("modalVideo");

if(iframe.tagName==="IFRAME"){
iframe.src="";
}

document.getElementById("videoModal").style.display="none";

}

let currentPage = 1;

let pageSize = window.innerWidth <= 768 ? 6 : 12;

let pageGroup = 1;
let pageGroupSize = 5;

async function loadPagination(){

let query = supabaseClient
  .from("board_posts")
  .select("*",{count:"exact", head:true});

if(currentCategory !== "전체"){
  query = query.eq("category", currentCategory);
}

const { count } = await query;

  const totalPages = Math.ceil(count / pageSize);

  const pagination = document.getElementById("pagination");
  pagination.innerHTML="";

  const startPage = (pageGroup - 1) * pageGroupSize + 1;
  const endPage = Math.min(startPage + pageGroupSize - 1, totalPages);

  /* 이전 그룹 */
  if(pageGroup > 1){

    const prev=document.createElement("button");
    prev.innerText="<<";

    prev.onclick=()=>{
      pageGroup--;
      loadPagination();
    };

    pagination.appendChild(prev);
  }

  /* 페이지 번호 */
  for(let i=startPage;i<=endPage;i++){

    const btn=document.createElement("button");
    btn.innerText=i;

    if(i===currentPage)
      btn.style.background="#87CEEB";

    btn.onclick=()=>{
      currentPage=i;
      loadBoard();

      document.getElementById("boardSection").scrollIntoView({
        behavior:"smooth"
      });
    };

    pagination.appendChild(btn);
  }

  /* 다음 그룹 */
  if(endPage < totalPages){

    const next=document.createElement("button");
    next.innerText=">>";

    next.onclick=()=>{
      pageGroup++;
      loadPagination();
    };

    pagination.appendChild(next);
  }

}

function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

function scrollToBottom(){
  window.scrollTo({
    top:document.documentElement.scrollHeight,
    behavior:"smooth"
  });
}

function focusSearch(){
  document.getElementById("searchInput").focus();
}

async function loadSite(){

  const boardSection=document.getElementById("boardSection");
  const imgBox=document.getElementById("imageAds");
  const txtBox=document.getElementById("textAds");
  const bottomBox=document.getElementById("bottomImageAds");
  const snsBox=document.getElementById("snsVideoAds");
  const bannerBox=document.getElementById("topBanner");

  // 🔥 전체 초기화
  boardSection.innerHTML="";
  imgBox.innerHTML="";
  txtBox.innerHTML="";
  bottomBox.innerHTML="";
  snsBox.innerHTML="";
  bannerBox.innerHTML="";

  /* ================= 광고 ================= */

  const { data: ads } = await supabaseClient
    .from("ads")
    .select("*")
    .order("id",{ascending:true});

  if(ads){
    ads.forEach(ad=>{

if(ad.type==="image"){
  const wrap=document.createElement("div");
  wrap.className="ad-item";
  wrap.setAttribute("data-title",(ad.main_title||"").toLowerCase());

const link = ad.link_url 
  ? `<a href="${ad.link_url}" target="_blank">
       <img src="${ad.image_url}">
     </a>`
  : ad.video_url
  ? `<img src="${ad.image_url}" onclick="openVideoModal('${ad.video_url}')">`
  : `<img src="${ad.image_url}" onclick="openImageModal('${ad.image_url}')">`;

  wrap.innerHTML=`
    <div class="img-ad">${link}</div>
    <div class="ad-title">${ad.main_title||""}</div>
  `;

  imgBox.appendChild(wrap);
}

      if(ad.type==="text"){
        const a=document.createElement("a");
        a.className="text-ad ad-item";
        a.href=ad.link_url||"#";
        a.target="_blank";
        a.innerText=ad.title||"텍스트광고";
        a.setAttribute("data-title",(ad.title||"").toLowerCase());
        txtBox.appendChild(a);
      }

      if(ad.type==="square"){
        const wrap=document.createElement("div");
        wrap.className="ad-item";
        wrap.setAttribute("data-title",(ad.main_title||"").toLowerCase());

const link = ad.link_url 
  ? `<a href="${ad.link_url}" target="_blank">
       <img src="${ad.image_url}">
     </a>`
  : ad.video_url
  ? `<img src="${ad.image_url}" onclick="openVideoModal('${ad.video_url}')">`
  : `<img src="${ad.image_url}" onclick="openImageModal('${ad.image_url}')">`;

        wrap.innerHTML=`
          <div class="square-ad">${link}</div>
          <div class="ad-title">${ad.main_title||""}</div>
        `;

        bottomBox.appendChild(wrap);
      }

if(ad.type==="sns"){
  const wrap=document.createElement("div");
  wrap.className="ad-item";
  wrap.setAttribute("data-title",(ad.title||"").toLowerCase());

  wrap.innerHTML=`
    <div class="sns-video">
      <img src="${ad.image_url}"
      onclick="openVideoModal('${ad.video_url}')">
    </div>
    <div class="ad-title">${ad.title||""}</div>
  `;

  snsBox.appendChild(wrap);
}

    });
  }

  /* ================= 설정 ================= */

  const { data: settings } = await supabaseClient
    .from("site_settings")
    .select("*")
    .limit(1);

  if(settings && settings.length>0){

    const s=settings[0];

if(s.search_logo){
  document.getElementById("searchLogo").src = s.search_logo;
}

if(s.banner_img){
  bannerBox.innerHTML = `
    ${s.banner_link
      ? `<a href="${s.banner_link}" target="_blank">
           <img src="${s.banner_img}">
         </a>`
      : `<img src="${s.banner_img}">`
    }
    <div id="weatherBox" class="weather-box">날씨 로딩중...</div>
  `;
}

    document.getElementById("ownerName").innerText=s.owner_name||"";
    document.getElementById("siteDescription").innerText=s.site_description||"";

    const snsBox=document.getElementById("ownerSNS");
    snsBox.innerHTML="";

    if(s.owner_instagram)
      snsBox.innerHTML+=`<a href="${s.owner_instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`;

    if(s.owner_youtube)
      snsBox.innerHTML+=`<a href="${s.owner_youtube}" target="_blank"><i class="fab fa-youtube"></i></a>`;

    if(s.owner_blog)
      snsBox.innerHTML+=`<a href="${s.owner_blog}" target="_blank"><i class="fas fa-blog"></i></a>`;
  }

/* ================= 애드센스 ================= */

const adsenseArea=document.getElementById("adsenseArea");

if(adsenseArea){

  const { data: adsense } = await supabaseClient
    .from("ads")
    .select("*")
    .eq("type","adsense")
    .order("sort",{ascending:true});

  adsenseArea.innerHTML="";

  if(adsense){
    adsense.forEach(ad=>{
      const div=document.createElement("div");
      div.className="adsense-block";
      div.innerHTML=ad.code;
      adsenseArea.appendChild(div);
    });
  }

}

}

loadSite();
loadBoard();
setTimeout(loadWeather,2000);

recordVisit();

async function recordVisit(){

  const today = new Date().toLocaleDateString("sv-SE");
  const visited = localStorage.getItem("visit_date");

  if(visited === today) return;

  const { data } = await supabaseClient
    .from("site_visits")
    .select("*")
    .eq("date", today);

  if(data && data.length > 0){

    const count = data[0].count || 0;

    await supabaseClient
      .from("site_visits")
      .update({ count: count + 1 })
      .eq("date", today);

  }else{

    await supabaseClient
      .from("site_visits")
      .insert([{ date: today, count: 1 }]);

  }

  localStorage.setItem("visit_date", today);
}

async function loadBoard(){

  const boardSection=document.getElementById("boardSection");
  boardSection.innerHTML="";

  const start=(currentPage-1)*pageSize;
  const end=start+pageSize-1;

let query = supabaseClient
  .from("board_posts")
  .select("*")
  .order("id",{ascending:false});

if(currentCategory !== "전체"){
  query = query.eq("category", currentCategory);
}

const { data: posts } = await query.range(start,end);

  if(posts){
    posts.forEach(post=>{

      const div=document.createElement("div");
      div.className="board-card";

      const date=new Date(post.created_at)
        .toLocaleDateString("ko-KR");

div.innerHTML = `
  <h3>[${post.category||"일반"}] ${escapeHTML(post.title)}</h3>
  <div class="board-preview">${escapeHTML(post.content)}</div>
  <div class="view-count" style="font-size:11px;color:#999;margin-top:6px;">
    ${date} · 조회 ${post.views||0}
  </div>
`;

div.onclick=async ()=>{

  await supabaseClient.rpc('increment_views', {
    post_id: post.id
  });

  const newViews = (post.views || 0) + 1;   // 🔥 이 줄 추가

  openModal(post.title, post.content, date, newViews);

  div.querySelector(".view-count").innerText =
    date + " · 조회 " + newViews;

  post.views = newViews;
};

      boardSection.appendChild(div);
    });
  }

  loadPagination();
}

document.getElementById("searchInput")
  .addEventListener("keydown",function(e){
    if(e.key==="Enter"){
      search();
    }
  });

async function boardSearch(){

  const keyword = document
    .getElementById("boardSearchInput")
    .value
    .trim()
    .toLowerCase();

  if(!keyword) return;

  const { data: posts, count } = await supabaseClient
    .from("board_posts")
    .select("*",{count:"exact"})
    .or(`title.ilike.%${keyword}%,content.ilike.%${keyword}%`)
    .limit(1);

  if(!posts || posts.length === 0){
    alert("검색 결과 없음");
    return;
  }

  const post = posts[0];

  /* ===== 게시글 순서 찾기 ===== */

const { count: position } = await supabaseClient
  .from("board_posts")
  .select("*",{count:"exact", head:true})
  .lt("id", post.id);

  const index = position;

  const targetPage = Math.floor(index / pageSize) + 1;

  currentPage = targetPage;

  await loadBoard();

  setTimeout(()=>{

    const boards=document.querySelectorAll(".board-card");

    boards.forEach(board=>{
      board.classList.remove("highlight");

      if(board.innerText.toLowerCase().includes(keyword)){
        board.classList.add("highlight");
        board.scrollIntoView({
          behavior:"smooth",
          block:"center"
        });
      }
    });

  },300);

}

function search(){

  const keyword=document.getElementById("searchInput")
    .value.trim().toLowerCase();

  if(!keyword) return;

  let found=false;

  /* ===== 광고 검색 ===== */
  const ads=document.querySelectorAll(".ad-item");

  ads.forEach(ad=>{
    ad.classList.remove("highlight");

    const title=ad.getAttribute("data-title");

    if(title && title.includes(keyword)){
      ad.classList.add("highlight");
      found=true;
      ad.scrollIntoView({behavior:"smooth", block:"center"});
    }
  });

  /* ===== 게시판 검색 ===== */
  const boards=document.querySelectorAll(".board-card");

  boards.forEach(board=>{
    board.classList.remove("highlight");

    const text=board.innerText.toLowerCase();

    if(text.includes(keyword)){
      board.classList.add("highlight");
      found=true;
      board.scrollIntoView({behavior:"smooth", block:"center"});
    }
  });

  if(!found){
    alert("검색 결과 없음");
  }
}

function openModal(title,content,date,views){
  document.getElementById("modalTitle").innerText=title;
  document.getElementById("modalContent").innerText=content;
  document.getElementById("modalMeta").innerText=
    date + " · 조회 " + views;
  document.getElementById("boardModal").style.display="flex";
}

function closeModal(){
  document.getElementById("boardModal").style.display="none";
}

// 팝업 배경 클릭 시 닫기
document.getElementById("boardModal")
  .addEventListener("click", function(e){

    // 배경을 클릭한 경우만 닫기
    if(e.target === this){
      closeModal();
    }

});

function outsideClose(e){
  if(e.target.classList.contains("modal")){
    closeModal();
  }
}

document.getElementById("boardSearchInput")
  .addEventListener("keydown",function(e){
    if(e.key==="Enter"){
      boardSearch();
    }
});

function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

function scrollToBottom(){
  window.scrollTo({
    top:document.documentElement.scrollHeight,
    behavior:"smooth"
  });
}

function openWritePost(){
  document.getElementById("writeModal").style.display="flex";
  document.getElementById("captchaAnswer").value="";
  generateCaptcha();
}

function closeWritePost(){
  document.getElementById("writeModal").style.display="none";
}

async function submitPost(){

  const title=document.getElementById("userPostTitle").value.trim();
  const content=document.getElementById("userPostContent").value.trim();
  const category=document.getElementById("userPostCategory").value;

const answer = document
  .getElementById("captchaAnswer")
  .value.trim();

if(parseInt(answer) !== captchaValue){
  alert("자동등록방지 정답이 틀렸습니다");
  generateCaptcha();
  return;
}

  if(!title||!content){
    alert("제목과 내용을 입력하세요");
    return;
  }

  const {error}=await supabaseClient
  .from("board_posts")
  .insert([{
    title:title,
    content:content,
    category:category
  }]);

  if(error){
    alert("등록 실패");
    return;
  }

  alert("게시글 등록 완료");

  closeWritePost();
  loadBoard();

}

async function loadWeather(){
  const box = document.getElementById("weatherBox");
  if(!box) return;

const banner = document.getElementById("topBanner");
if(!banner) return;

// 기존 효과 제거
banner.classList.remove("rain","snow","thunder","wind");

  try{
    const res = await fetch("https://wttr.in/42.88,129.51?format=j1");
    const data = await res.json();

    const current = data.current_condition[0];

    const temp = current.temp_C;
    const feels = current.FeelsLikeC;
    let desc = current.weatherDesc[0].value;

const map = {
  "Sunny":"맑음",
  "Clear":"맑음",
  "Partly cloudy":"구름 조금",
  "Cloudy":"흐림",
  "Overcast":"흐림",
  "Mist":"안개",
  "Fog":"안개",

  "Rain":"비",
  "Light rain":"약한 비",
  "Moderate rain":"비",
  "Heavy rain":"폭우",

  "Drizzle":"이슬비",
  "Light drizzle":"약한 이슬비",
  "Patchy light drizzle":"약한 이슬비",
  "Freezing drizzle":"어는 이슬비",

  "Patchy rain possible":"비 가능성",
  "Patchy light rain":"약한 비",
  "Patchy moderate rain":"비",

  "Snow":"눈",
  "Light snow":"약한 눈",
  "Heavy snow":"폭설",

  "Thunderstorm":"천둥번개"
};

desc = map[desc] || "날씨 정보";

if(desc.includes("천둥") || desc.includes("번개")){
  banner.classList.add("thunder");
}
else if(desc.includes("비") || desc.includes("폭우") || desc.includes("소나기")){
  banner.classList.add("rain");
}
else if(desc.includes("눈") || desc.includes("폭설")){
  banner.classList.add("snow");
}
else if(current.windspeedKmph > 20){
  banner.classList.add("wind");
}

// 출력
box.innerHTML = `
  <div>
    연변조선족자치주 ${temp}°C
    <div style="font-size:11px;color:#ddd;">
      체감 ${feels}°C · ${desc}
    </div>
  </div>
`;

  }catch(e){
    box.innerText="날씨 오류";
  }
}

</script>
