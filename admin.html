<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 페이지</title>

<style>

body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:#f5f5f5;
}

h2{ margin-top:40px; }

input{
  width:100%;
  height:36px;
  margin-bottom:6px;
  padding:0 8px;
  box-sizing:border-box;
}

button{
  height:36px;
  padding:0 12px;
  border:none;
  background:#87CEEB;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}

button:hover{ background:#6bbfe0; }

.section{
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.card{
  background:#fff;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  position:relative;
}

.delete-btn{
  position:absolute;
  top:6px;
  right:6px;
  background:#ff5c5c;
  height:24px;
  font-size:12px;
}

.save-btn{
  width:200px;
  display:block;
  margin:40px auto;
  height:45px;
  font-size:16px;
}

.admin-container{
  width:1400px;
  margin:0 auto;
}

@media (max-width:1400px){
  .admin-container{
    width:100%;
    padding:0 20px;
  }
}

</style>
</head>

<body>

<!-- 로그인 페이지 -->

<div id="loginPage" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
width:320px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
">

<h2 style="text-align:center;">관리자 로그인</h2>

<input id="loginEmail" placeholder="이메일">
<input id="loginPassword" type="password" placeholder="비밀번호">

<button onclick="loginAdmin()" style="width:100%;margin-top:10px;">
로그인
</button>

</div>
</div>

<div class="admin-container">

<h1>관리자 페이지</h1>

<button onclick="logoutAdmin()" style="
position:absolute;
top:20px;
right:20px;
background:#ff6b6b;">
로그아웃
</button>


<!-- 상단 배너 -->

<div class="section">
<h2>상단 배너 관리</h2>
<input id="bannerImg" placeholder="배너 이미지 URL">
<input id="bannerLink" placeholder="배너 클릭 링크">
</div>


<!-- 이미지 광고 -->

<div class="section">
<h2>상단 이미지 광고</h2>

<button onclick="addImageAd()">추가 +</button>

<div class="grid" id="imageAdmin"></div>

</div>


<!-- 텍스트 광고 -->

<div class="section">

<h2>텍스트 광고</h2>

<button onclick="addTextAd()">추가 +</button>

<div class="grid" id="textAdmin"></div>

</div>


<!-- 정방형 광고 -->

<div class="section">

<h2>하단 정방형 광고</h2>

<button onclick="addSquareAd()">추가 +</button>

<div class="grid" id="squareAdmin"></div>

</div>

<div class="section">
<h2>게시판 관리</h2>

<input id="boardTitle" placeholder="글 제목">

<textarea id="boardContent"
style="width:100%;height:120px;margin-bottom:10px;padding:10px;"
placeholder="글 내용"></textarea>

<button onclick="addBoardPost()">글 추가</button>

<div id="boardAdminList" style="margin-top:20px;"></div>
</div>

<button class="save-btn" onclick="saveAll()">저장하기</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>


<script>

/* ================= 로그인 체크 ================= */

async function checkAdmin(){

const { data:{session} } =
await supabaseClient.auth.getSession();

if(!session){

document.getElementById("loginPage").style.display="flex";

}else{

document.getElementById("loginPage").style.display="none";

}

}

checkAdmin();


/* ================= 로그인 ================= */

async function loginAdmin(){

const email=document.getElementById("loginEmail").value;
const password=document.getElementById("loginPassword").value;

const { error } =
await supabaseClient.auth.signInWithPassword({
email:email,
password:password
});

if(error){

alert("로그인 실패");

}else{

location.reload();

}

}


/* ================= 로그아웃 ================= */

async function logoutAdmin(){

await supabaseClient.auth.signOut();

location.reload();

}


/* ================= 광고 ================= */

const imageAdmin=document.getElementById("imageAdmin");
const textAdmin=document.getElementById("textAdmin");
const squareAdmin=document.getElementById("squareAdmin");

const bannerImg=document.getElementById("bannerImg");
const bannerLink=document.getElementById("bannerLink");


function createCard(innerHTML){

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<button class="delete-btn" onclick="this.parentElement.remove()">삭제</button>
${innerHTML}
`;

return div;

}


/* 이미지 광고 */

function addImageAd(main="",img="",link=""){

imageAdmin.appendChild(

createCard(`

<input value="${main}" placeholder="메인 명칭">

<input value="${img}" placeholder="이미지 URL">

<input value="${link}" placeholder="클릭 링크">

`)

);

}


/* 텍스트 광고 */

function addTextAd(title="",link=""){

textAdmin.appendChild(

createCard(`

<input value="${title}" placeholder="광고 제목">

<input value="${link}" placeholder="클릭 링크">

`)

);

}


/* 정방형 광고 */

function addSquareAd(main="",img="",link=""){

squareAdmin.appendChild(

createCard(`

<input value="${main}" placeholder="메인 명칭">

<input value="${img}" placeholder="이미지 URL">

<input value="${link}" placeholder="클릭 링크">

`)

);

}


/* ================= 데이터 불러오기 ================= */

async function loadData(){

const { data: ads } = await supabaseClient

.from("ads")

.select("*")

.order("id",{ascending:true});

if(ads){

ads.forEach(ad=>{

if(ad.type==="image")

addImageAd(ad.main_title,ad.image_url,ad.link_url);

if(ad.type==="text")

addTextAd(ad.title,ad.link_url);

if(ad.type==="square")

addSquareAd(ad.main_title,ad.image_url,ad.link_url);

});

}

}

loadData();

/* ================= 게시판 ================= */

const boardAdminList = document.getElementById("boardAdminList");

async function loadBoard(){

  boardAdminList.innerHTML="";

  const { data } = await supabaseClient
    .from("board_posts")
    .select("*")
    .order("id",{ascending:false});

  if(data){
    data.forEach(post=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`
        <button class="delete-btn"
          onclick="deleteBoardPost(${post.id})">삭제</button>
        <strong>${post.title}</strong>
        <div style="margin-top:8px;font-size:14px;">
          ${post.content}
        </div>
      `;
      boardAdminList.appendChild(div);
    });
  }
}

async function addBoardPost(){

  const title=document.getElementById("boardTitle").value.trim();
  const content=document.getElementById("boardContent").value.trim();

  if(!title || !content){
    alert("제목과 내용을 입력하세요");
    return;
  }

  await supabaseClient.from("board_posts").insert([{
    title:title,
    content:content
  }]);

  document.getElementById("boardTitle").value="";
  document.getElementById("boardContent").value="";

  loadBoard();
}

async function deleteBoardPost(id){

  await supabaseClient
    .from("board_posts")
    .delete()
    .eq("id",id);

  loadBoard();
}

loadBoard();


/* ================= 저장 ================= */

async function saveAll(){

await supabaseClient.from("ads").delete().neq("id",0);


/* 이미지 */

for(const block of imageAdmin.children){

const i=block.querySelectorAll("input");

if(i[1].value.trim()){

await supabaseClient.from("ads").insert([{

type:"image",

main_title:i[0].value.trim(),

image_url:i[1].value.trim(),

link_url:i[2].value.trim()

}]);

}

}


/* 텍스트 */

for(const block of textAdmin.children){

const i=block.querySelectorAll("input");

if(i[0].value.trim()){

await supabaseClient.from("ads").insert([{

type:"text",

title:i[0].value.trim(),

link_url:i[1].value.trim()

}]);

}

}


/* 정방형 */

for(const block of squareAdmin.children){

const i=block.querySelectorAll("input");

if(i[1].value.trim()){

await supabaseClient.from("ads").insert([{

type:"square",

main_title:i[0].value.trim(),

image_url:i[1].value.trim(),

link_url:i[2].value.trim()

}]);

}

}

alert("저장 완료");

}

</script>

</body>
</html>
