<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 페이지</title>

<style>

.admin-buttons button{
  width:100px;
}

#boardAdminList{
  max-height:400px;
  overflow:auto;
}

.board-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

html,body{
  height:100%;
}

body.login-mode{
  overflow:hidden;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:#f5f5f5;
}

h2{ margin-top:40px; }

input{
  width:99.8%;
  height:36px;
  margin-bottom:6px;
  padding:0 8px;
  box-sizing:border-box;
}

button{
  height:36px;
  padding:0 12px;
  border:none;
  background:#87CEEB;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}

button:hover{ background:#6bbfe0; }

.section{
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.card{
  background:#fff;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  cursor:grab;
  position:relative;
}

/* 게시판 카드 간격 */
#boardAdminList .card{
  margin-bottom:10px;
}

#boardAdminList{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.delete-btn{
  position:absolute;
  top:6px;
  right:6px;
  background:#ff5c5c;
  height:24px;
  font-size:12px;
}

.save-btn{
  height:38px;
  font-size:12px;
}

.admin-container{
  width:1400px;
  margin:0 auto;
}

@media (max-width:1400px){
  .admin-container{
    width:100%;
    padding:0 20px;
  }
}

.top-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.board-box{
  background:white;
  border:1px solid #ddd;
  border-radius:8px;
  padding:15px;
  height:100%;
  display:flex;
  flex-direction:column;
}

.board-content{
  flex:1;
  overflow:auto;
}

.board-box{
  background:white;
  border:1px solid #ddd;
  border-radius:8px;
  padding:15px;
  min-height:500px;
  display:flex;
  flex-direction:column;
}

.board-box input,
.board-box textarea{
  width:100%;
  box-sizing:border-box;
}

.board-content{
  flex:1;
  overflow:auto;
}

.edit-btn{
  position:absolute;
  top:6px;
  right:60px;
  height:24px;
  font-size:12px;
  background:#4CAF50;
}

/* 게시판 페이지 버튼 */
#boardPagination button{
  background:white;
  color:#333;
  border:1px solid #ddd;
  margin:0 3px;
}

/* 현재 페이지 */
#boardPagination button.active{
  background:#87CEEB;
  color:white;
}

.admin-buttons{
  position:fixed;

  left:50%;
  margin-left:720px;

  top:50%;
  transform:translateY(-50%);

  display:flex;
  flex-direction:column;
  gap:5px;

  z-index:999;
}

.top-btn{
  height:40px;
  background:#e5e5e5;
  color:#333;
}

.admin-main{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.admin-scroll{
  display:flex;
  flex-direction:column;
  gap:5px;
  margin-top:15px;
}

</style>

</head>

<body>

<div id="loginPage" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#f5f5f5;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">

<div style="
width:320px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
">

<h2 style="text-align:center;margin-bottom:20px;">
관리자 로그인
</h2>

<input id="loginEmail" placeholder="이메일">
<input id="loginPassword" type="password" placeholder="비밀번호">

<button onclick="adminLogin()" style="width:100%;margin-top:10px;">
로그인
</button>

</div>
</div>

<div class="admin-container" id="adminPage" style="display:none;">

<h1>관리자 페이지</h1>

<div class="top-grid">

<!-- ================== 상단 배너 ================== -->
<div class="section">
<h2>상단 배너 관리</h2>
<input id="bannerImg" placeholder="배너 이미지 URL">

<input type="file" accept="image/*"
  onchange="uploadBannerImage(this)">

<input id="bannerLink" placeholder="배너 클릭 링크">
</div>

<!-- ================== 소유자 정보 ================== -->
<div class="section">
<h2>소유자 정보 관리</h2>
<input id="ownerNameInput" placeholder="소유자 이름">
<input id="ownerInstagram" placeholder="인스타그램 URL">
<input id="ownerYoutube" placeholder="유튜브 URL">
<input id="ownerBlog" placeholder="블로그 URL">
</div>

</div>

<!-- ================== 사이트 설명 ================== -->
<div class="section">
<h2>사이트 설명 관리</h2>
<textarea id="siteDescriptionInput"
  placeholder="사이트 설명 입력"
  style="width:98.3%; height:100px; margin-bottom:10px; padding:10px;"></textarea>
</div>

<!-- ================== 이미지 광고 ================== -->
<div class="section">
<div style="display:flex; align-items:center; gap:10px;">
<h2>상단 이미지 광고</h2>
<button onclick="addImageAd()">추가 +</button>
</div>

<div class="grid" id="imageAdmin"></div>

<!-- ================== 텍스트 광고 ================== -->
<div class="section">
<h2>텍스트 광고</h2>
<button onclick="addTextAd()">추가 +</button>
<div class="grid" id="textAdmin"></div>
</div>

<!-- ================== 정방형 광고 ================== -->
<div class="section">
<h2>하단 정방형 광고</h2>
<button onclick="addSquareAd()">추가 +</button>
<div class="grid" id="squareAdmin"></div>
</div>

<!-- ================== 게시판 관리 ================== -->

<div class="section">

<h2>게시판 관리</h2>

<div class="board-grid">

<!-- 왼쪽 : 글 작성 -->
<div class="board-box">

<input id="boardTitle" placeholder="글 제목">

<textarea id="boardContent"
placeholder="글 내용"
style="width:100%; height:120px; margin-bottom:10px; padding:10px;"></textarea>

<button onclick="addBoardPost()">글 추가</button>

</div>


<!-- 오른쪽 : 게시글 목록 -->
<div class="board-box">

<div class="board-content">

<div id="boardAdminList"></div>

</div>

<div id="boardPagination"
style="margin-top:10px;text-align:center;"></div>

</div>

</div>

</div>

<div class="admin-buttons">

<div class="admin-main">

<button class="save-btn" onclick="saveAll()">저장하기</button>

<button onclick="adminLogout()" style="background:#ff5c5c;">
로그아웃
</button>

</div>

<div class="admin-scroll">

<button class="top-btn" onclick="scrollToTop()">🔝</button>

<button class="top-btn" onclick="scrollToBottom()">🔻</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

document.body.classList.add("login-mode");

async function adminLogin(){

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    alert("로그인 실패");
    return;
  }

  document.getElementById("loginPage").style.display="none";
  document.getElementById("adminPage").style.display="block";

  document.body.classList.remove("login-mode");

}

const imageAdmin=document.getElementById("imageAdmin");
const textAdmin=document.getElementById("textAdmin");
const squareAdmin=document.getElementById("squareAdmin");

const bannerImg=document.getElementById("bannerImg");
const bannerLink=document.getElementById("bannerLink");

const ownerNameInput=document.getElementById("ownerNameInput");
const ownerInstagram=document.getElementById("ownerInstagram");
const ownerYoutube=document.getElementById("ownerYoutube");
const ownerBlog=document.getElementById("ownerBlog");

let dragItem=null;

/* ================= 공통 카드 생성 ================= */

function createCard(innerHTML){
  const div=document.createElement("div");
  div.className="card";
  div.draggable=true;
  div.innerHTML=`
    <button class="delete-btn" onclick="deleteAd(this)">삭제</button>
    ${innerHTML}
  `;

  div.addEventListener("dragstart",()=>dragItem=div);
  div.addEventListener("dragover",e=>e.preventDefault());
  div.addEventListener("drop",function(){
    if(dragItem!==div){
      div.parentNode.insertBefore(dragItem,div);
    }
  });

  return div;
}

/* ================= 추가 ================= */

function addImageAd(main="", img="", link=""){
  imageAdmin.appendChild(
    createCard(`
      <input value="${main}" placeholder="메인 명칭">

      <input value="${img}" placeholder="이미지 URL">

      <input type="file" accept="image/*"
        onchange="uploadImage(this)">

      <input value="${link}" placeholder="클릭 링크">
    `)
  );
}

function addTextAd(title="",link=""){
  textAdmin.appendChild(
    createCard(`
      <input value="${title}" placeholder="광고 제목">
      <input value="${link}" placeholder="클릭 링크">
    `)
  );
}

function addSquareAd(main="", img="", link=""){
  squareAdmin.appendChild(
    createCard(`
      <input value="${main}" placeholder="메인 명칭">

      <input value="${img}" placeholder="이미지 URL">

      <input type="file" accept="image/*"
        onchange="uploadImage(this)">

      <input value="${link}" placeholder="클릭 링크">
    `)
  );
}

/* ================= 불러오기 ================= */

async function loadData(){

  const { data: ads } = await supabaseClient
    .from("ads")
    .select("*")
    .order("id",{ascending:true});

  if(ads){
    ads.forEach(ad=>{
      if(ad.type==="image")
        addImageAd(ad.main_title, ad.image_url, ad.link_url);
      if(ad.type==="text")
        addTextAd(ad.title,ad.link_url);
      if(ad.type==="square")
        addSquareAd(ad.main_title, ad.image_url, ad.link_url);
    });
  }

  const { data: settings } = await supabaseClient
    .from("site_settings")
    .select("*")
    .limit(1);

  if(settings && settings.length>0){

    const s=settings[0];

    bannerImg.value=s.banner_img||"";
    bannerLink.value=s.banner_link||"";

    ownerNameInput.value=s.owner_name||"";
    ownerInstagram.value=s.owner_instagram||"";
    ownerYoutube.value=s.owner_youtube||"";
    ownerBlog.value=s.owner_blog||"";

    // 🔥 여기로 이동
    document.getElementById("siteDescriptionInput").value =
      s.site_description || "";
  }
}

/* ================= 저장 ================= */

async function saveAll(){

  await supabaseClient.from("ads").delete().neq("id",0);

for(const block of imageAdmin.children){
  const i=block.querySelectorAll("input");
  if(i[1].value.trim()){
    await supabaseClient.from("ads").insert([{
      type:"image",
      main_title:i[0].value.trim(),
      image_url:i[1].value.trim(),
      link_url:i[3].value.trim()
    }]);
  }
}

  for(const block of textAdmin.children){
    const i=block.querySelectorAll("input");
    if(i[0].value.trim()){
      await supabaseClient.from("ads").insert([{
        type:"text",
        title:i[0].value.trim(),
        link_url:i[1].value.trim()
      }]);
    }
  }

for(const block of squareAdmin.children){
  const i=block.querySelectorAll("input");
  if(i[1].value.trim()){
    await supabaseClient.from("ads").insert([{
      type:"square",
      main_title:i[0].value.trim(),
      image_url:i[1].value.trim(),
      link_url:i[3].value.trim()
    }]);
  }
}

  await supabaseClient
    .from("site_settings")
    .upsert([{
      id:1,
site_description: document
  .getElementById("siteDescriptionInput")
  .value.trim(),
      banner_img:bannerImg.value.trim(),
      banner_link:bannerLink.value.trim(),
      owner_name:ownerNameInput.value.trim(),
      owner_instagram:ownerInstagram.value.trim(),
      owner_youtube:ownerYoutube.value.trim(),
      owner_blog:ownerBlog.value.trim()
    }]);

  alert("저장 완료 ✅");
}

async function checkLogin(){

  const { data } = await supabaseClient.auth.getSession();

  if(data.session){

    document.getElementById("loginPage").style.display="none";
    document.getElementById("adminPage").style.display="block";
    document.body.classList.remove("login-mode");

  }

}

checkLogin();

loadData();

const boardAdminList = document.getElementById("boardAdminList");
const boardPagination = document.getElementById("boardPagination");

let boardData = [];
let currentPage = 1;
let editingPostId = null;

const rowsPerPage = 5;
const maxPageButtons = 10;

/* 게시판 데이터 불러오기 */

async function loadBoardData(){

  const { data } = await supabaseClient
    .from("board_posts")
    .select("*")
    .order("id",{ascending:false});

  boardData = data || [];
  currentPage = 1;

  renderBoard();
}

/* 게시판 출력 */

function renderBoard(){

  boardAdminList.innerHTML="";

  const start = (currentPage-1)*rowsPerPage;
  const end = start+rowsPerPage;

  const pageItems = boardData.slice(start,end);

  pageItems.forEach(post=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
<button class="delete-btn"
onclick="deleteBoardPost(${post.id})">삭제</button>

<button style="position:absolute;top:6px;right:60px;height:24px;font-size:12px;background:#4CAF50;"
onclick="editBoardPost(${post.id}, \`${post.title}\`, \`${post.content}\`)">
수정
</button>

      <strong>${post.title}</strong>

      <div style="margin-top:8px;font-size:14px;">
      ${post.content}
      </div>
    `;

    boardAdminList.appendChild(div);

  });

  renderPagination();

}

/* 페이지 버튼 */

function renderPagination(){

  boardPagination.innerHTML="";

  const totalPages=Math.ceil(boardData.length/rowsPerPage);

  let startPage=Math.floor((currentPage-1)/maxPageButtons)*maxPageButtons+1;
  let endPage=Math.min(startPage+maxPageButtons-1,totalPages);

  if(currentPage>1){

    const prev=document.createElement("button");
    prev.textContent="◀";

    prev.onclick=()=>{
      currentPage--;
      renderBoard();
    };

    boardPagination.appendChild(prev);

  }

  for(let i=startPage;i<=endPage;i++){

    const btn=document.createElement("button");
    btn.textContent=i;

if(i===currentPage){
  btn.classList.add("active");
}

    btn.onclick=()=>{
      currentPage=i;
      renderBoard();
    };

    boardPagination.appendChild(btn);

  }

  if(currentPage<totalPages){

    const next=document.createElement("button");
    next.textContent="▶";

    next.onclick=()=>{
      currentPage++;
      renderBoard();
    };

    boardPagination.appendChild(next);

  }

}

/* 글 추가 */

async function addBoardPost(){

  const title=document.getElementById("boardTitle").value.trim();
  const content=document.getElementById("boardContent").value.trim();

  if(!title || !content){
    alert("제목과 내용을 입력하세요");
    return;
  }

  if(editingPostId){

    await supabaseClient
      .from("board_posts")
      .update({
        title:title,
        content:content
      })
      .eq("id",editingPostId);

    editingPostId=null;

  }else{

    await supabaseClient.from("board_posts").insert([{
      title:title,
      content:content
    }]);

  }

  document.getElementById("boardTitle").value="";
  document.getElementById("boardContent").value="";

  loadBoardData();

}

/* 글 삭제 */

async function deleteBoardPost(id){

  await supabaseClient
  .from("board_posts")
  .delete()
  .eq("id",id);

  loadBoardData();

}

loadBoardData();

async function adminLogout(){

  await supabaseClient.auth.signOut();

  document.getElementById("loginPage").style.display="flex";
  document.getElementById("adminPage").style.display="none";

  document.body.classList.add("login-mode");

}

async function uploadImage(input){

  const file = input.files[0];
  if(!file) return;

const safeName = file.name.replace(/\s+/g,"_");
const fileName = Date.now()+"_"+safeName;

  const { data, error } = await supabaseClient
    .storage
    .from("yb365")
    .upload(fileName, file);

  if(error){
    alert("업로드 실패");
    return;
  }

  const { data: urlData } = supabaseClient
    .storage
    .from("yb365")
    .getPublicUrl(fileName);

  const imageUrl = urlData.publicUrl;

  const urlInput = input.parentElement.querySelectorAll("input")[1];
  urlInput.value = imageUrl;

await saveAll();

  alert("업로드 완료 ✅");
}

async function uploadBannerImage(input){

  const file = input.files[0];
  if(!file) return;

  const fileName = "banner_"+Date.now()+"_"+file.name;

  const { data, error } = await supabaseClient
    .storage
    .from("yb365")
    .upload(fileName, file);

  if(error){
    alert("배너 업로드 실패");
    return;
  }

  const { data: urlData } = supabaseClient
    .storage
    .from("yb365")
    .getPublicUrl(fileName);

  const imageUrl = urlData.publicUrl;

  document.getElementById("bannerImg").value = imageUrl;

await saveAll();

  alert("배너 업로드 완료 ✅");
}

async function deleteAd(btn){

  const card = btn.parentElement;
  const inputs = card.querySelectorAll("input");

  let imageUrl = "";

  if(inputs.length >= 2){
    imageUrl = inputs[1].value.trim();
  }

  if(imageUrl){

    const filePath = imageUrl.split("/yb365/")[1];

    const { error } = await supabaseClient
      .storage
      .from("yb365")
      .remove([filePath]);

    if(error){
      console.log("삭제 에러:", error);
      alert("삭제 실패 콘솔 확인");
      return;
    }

  }

  card.remove();
  await saveAll();
}

function editBoardPost(id,title,content){

  document.getElementById("boardTitle").value = title;
  document.getElementById("boardContent").value = content;

  editingPostId = id;

  document.querySelector("#boardTitle").scrollIntoView({
    behavior:"smooth"
  });

}

function scrollToTop(){

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

function scrollToBottom(){

  window.scrollTo({
    top:document.body.scrollHeight,
    behavior:"smooth"
  });

}

</script>

</body>
</html>
